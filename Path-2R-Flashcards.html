<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HF · Pericardial · Vascular · Vasculitis — Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f14;--surface:#161920;--surface2:#1e2230;--border:#2a2f3d;
  --text:#e8eaf0;--muted:#7a8099;
  --hf:#4f9cf9;--peri:#a78bfa;--vasc:#f96060;--vas:#3dd68c;--amber:#f9a84f;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}

header{padding:22px 32px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-family:'DM Serif Display',serif;font-size:22px}
.logo span{color:var(--muted);font-size:13px;font-family:'DM Sans',sans-serif;margin-left:8px}
.kbd-hint{font-size:12px;color:var(--muted)}
.kbd-hint kbd{background:var(--border);padding:2px 7px;border-radius:4px;font-size:11px;font-family:'DM Sans',sans-serif}

.filters{display:flex;gap:8px;flex-wrap:wrap;padding:14px 32px;border-bottom:1px solid var(--border)}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;
  font-size:13px;cursor:pointer;transition:all .15s}
.filter-btn.active{color:#fff}
.filter-btn[data-f="all"].active{background:var(--hf);border-color:var(--hf)}
.filter-btn[data-f="hf"].active{background:var(--hf);border-color:var(--hf)}
.filter-btn[data-f="peri"].active{background:var(--peri);border-color:var(--peri)}
.filter-btn[data-f="vasc"].active{background:var(--vasc);border-color:var(--vasc)}
.filter-btn[data-f="vas"].active{background:var(--vas);border-color:var(--vas)}
.filter-btn[data-f="review"].active{background:var(--amber);border-color:var(--amber)}
.filter-btn:hover:not(.active){border-color:var(--hf);color:var(--hf)}

.stats{display:flex;gap:24px;padding:12px 32px;border-bottom:1px solid var(--border);font-size:13px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px}
.stat-dot{width:8px;height:8px;border-radius:50%}

.progress-bar{height:3px;background:var(--border);margin:0 32px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--hf),var(--peri),var(--vas));transition:width .4s ease}

.card-area{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 32px;min-height:460px}
.card-counter{font-size:13px;color:var(--muted);margin-bottom:20px}

.card{width:100%;max-width:700px;perspective:1200px}
.card-inner{position:relative;width:100%;transform-style:preserve-3d;transition:transform .5s cubic-bezier(.4,0,.2,1)}
.card-inner.flipped{transform:rotateY(180deg)}

.card-face{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px;
  min-height:270px;display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;backface-visibility:hidden;-webkit-backface-visibility:hidden}
.card-back{position:absolute;top:0;left:0;right:0;transform:rotateY(180deg);background:var(--surface2)}

.card-section-tag{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 10px;border-radius:4px;margin-bottom:18px}
.card-q{font-family:'DM Serif Display',serif;font-size:22px;line-height:1.4;color:var(--text);margin-bottom:12px}
.card-hint{font-size:13px;color:var(--muted);font-style:italic}
.card-a{font-size:17px;font-weight:500;color:var(--text);line-height:1.6;margin-bottom:12px}
.card-exp{font-size:13px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);
  padding-top:12px;margin-top:4px;text-align:left;width:100%}
.card-exp strong{color:var(--hf)}
.flip-hint{margin-top:16px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
.flip-hint kbd{background:var(--border);padding:2px 7px;border-radius:4px;font-family:'DM Sans',sans-serif;font-size:11px}

.actions{display:flex;gap:12px;justify-content:center;padding:8px 32px 32px;flex-wrap:wrap}
.btn{padding:12px 28px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;
  font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:8px}
.btn-flip{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-flip:hover{border-color:var(--hf);color:var(--hf)}
.btn-know{background:rgba(61,214,140,.15);color:var(--vas);border:1px solid rgba(61,214,140,.3)}
.btn-know:hover{background:rgba(61,214,140,.25)}
.btn-review{background:rgba(249,168,79,.15);color:var(--amber);border:1px solid rgba(249,168,79,.3)}
.btn-review:hover{background:rgba(249,168,79,.25)}

.complete-screen{display:none;flex-direction:column;align-items:center;justify-content:center;padding:60px 32px;text-align:center;min-height:400px}
.complete-screen h2{font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:12px}
.complete-screen p{color:var(--muted);margin-bottom:32px}
.score-grid{display:flex;gap:24px;margin-bottom:32px;flex-wrap:wrap;justify-content:center}
.score-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 28px}
.score-num{font-family:'DM Serif Display',serif;font-size:36px}
.score-label{font-size:12px;color:var(--muted);margin-top:4px}

@keyframes slideIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:slideIn .3s ease}
</style>
</head>
<body>

<header>
  <div><div class="logo">HF · Pericardial · Vascular · Vasculitis <span>Flashcard Drill</span></div></div>
  <div class="kbd-hint">Press <kbd>Space</kbd> to flip · <kbd>→</kbd> Got it · <kbd>←</kbd> Review again</div>
</header>

<div class="filters" id="filters">
  <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">All Topics</button>
  <button class="filter-btn" data-f="hf" onclick="setFilter('hf',this)">Heart Failure</button>
  <button class="filter-btn" data-f="peri" onclick="setFilter('peri',this)">Pericardial</button>
  <button class="filter-btn" data-f="vasc" onclick="setFilter('vasc',this)">Aortic/Vascular</button>
  <button class="filter-btn" data-f="vas" onclick="setFilter('vas',this)">Vasculitis</button>
  <button class="filter-btn" data-f="review" onclick="setFilter('review',this)">⭐ Review Again</button>
</div>

<div class="stats">
  <div class="stat"><div class="stat-dot" style="background:var(--hf)"></div><span id="stat-rem">0 remaining</span></div>
  <div class="stat"><div class="stat-dot" style="background:var(--vas)"></div><span id="stat-know">0 known</span></div>
  <div class="stat"><div class="stat-dot" style="background:var(--amber)"></div><span id="stat-rev">0 to review</span></div>
</div>
<div style="padding:8px 32px 0"><div class="progress-bar"><div class="progress-fill" id="progress"></div></div></div>

<div id="main-view">
  <div class="card-area">
    <div class="card-counter" id="counter"></div>
    <div class="card" id="card">
      <div class="card-inner" id="card-inner">
        <div class="card-face" id="front">
          <div class="card-section-tag" id="front-tag">QUESTION</div>
          <div class="card-q" id="q-text"></div>
          <div class="card-hint" id="q-hint"></div>
          <div class="flip-hint"><kbd>Space</kbd> or tap to reveal answer</div>
        </div>
        <div class="card-face card-back" id="back">
          <div class="card-section-tag" style="background:rgba(61,214,140,.15);color:var(--vas)">ANSWER</div>
          <div class="card-a" id="a-text"></div>
          <div class="card-exp" id="a-exp"></div>
        </div>
      </div>
    </div>
  </div>
  <div class="actions">
    <button class="btn btn-flip" onclick="flip()">🔄 Flip Card</button>
    <button class="btn btn-review" onclick="rate('review')" id="btn-rev" style="display:none">⭐ Review Again</button>
    <button class="btn btn-know" onclick="rate('know')" id="btn-know" style="display:none">✓ Got It</button>
  </div>
</div>

<div class="complete-screen" id="done-view">
  <h2>Deck Complete! 🎉</h2>
  <p id="done-msg">Here's how you did:</p>
  <div class="score-grid">
    <div class="score-box"><div class="score-num" id="done-know" style="color:var(--vas)">0</div><div class="score-label">Got It</div></div>
    <div class="score-box"><div class="score-num" id="done-rev" style="color:var(--amber)">0</div><div class="score-label">Review Again</div></div>
  </div>
  <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-review" onclick="restartReview()">Study Review Cards</button>
    <button class="btn btn-flip" onclick="restartAll()">Restart All</button>
  </div>
</div>

<script>
const TAG_COLORS={hf:'var(--hf)',peri:'var(--peri)',vasc:'var(--vasc)',vas:'var(--vas)'};
const TAG_NAMES={hf:'Heart Failure',peri:'Pericardial',vasc:'Aortic/Vascular',vas:'Vasculitis'};

const ALL_CARDS=[
// HEART FAILURE
{q:"HFrEF vs HFpEF — EF cutoffs?",a:"HFrEF ≤40% (systolic failure). HFpEF ≥50% (diastolic failure).",exp:"<strong>HFrEF</strong> = contractility failure. <strong>HFpEF</strong> = compliance failure — stiff ventricle, normal EF. Both cause symptoms of HF. Don't confuse preserved EF with normal cardiac function.",tag:"hf"},
{q:"S3 gallop — what does it indicate?",a:"Dilated, volume-overloaded LV → HFrEF / systolic dysfunction",exp:"Blood rapidly enters and decelerates in a floppy, dilated ventricle in <strong>early diastole</strong>. Contrast with S4 = atrial kick against a stiff, hypertrophied ventricle (HFpEF). S3 = sloshing in; S4 = pushing through.",tag:"hf"},
{q:"S4 gallop — what does it indicate?",a:"Stiff, hypertrophied LV → HFpEF / diastolic dysfunction",exp:"Blood hits a non-compliant ventricle during the <strong>atrial kick (late diastole)</strong>. Classic in hypertensive concentric LVH and HCM. Contrast with S3 (dilated LV, early diastole).",tag:"hf"},
{q:"GDMT 4 pillars for HFrEF — name them",a:"Beta-blocker + ARNI/ACEi/ARB + MRA (spironolactone) + SGLT2 inhibitor",exp:"All four have proven <strong>mortality benefit</strong> in HFrEF. Diuretics relieve symptoms only — no mortality benefit. Never start beta-blocker in acute decompensated HF — wait until euvolemic.",tag:"hf"},
{q:"Diuretics in heart failure — do they reduce mortality?",a:"NO — symptom relief only. No survival benefit in HFrEF or HFpEF.",exp:"Furosemide reduces congestion and dyspnea but does not alter the natural history of HF. This is a frequently tested distinction: GDMT = survival benefit; diuretics = symptoms only.",tag:"hf"},
{q:"MRA contraindications in HFrEF?",a:"K+ >5.0 mEq/L or eGFR <30 mL/min",exp:"Spironolactone and eplerenone cause <strong>hyperkalemia</strong> and can worsen renal function. Hold or discontinue if K+ rises above 5.0 or eGFR drops below 30. Switch to eplerenone if gynecomastia occurs with spironolactone.",tag:"hf"},
{q:"When should beta-blockers NOT be initiated in HF?",a:"Acute decompensated HF — only start when euvolemic",exp:"Beta-blockers can worsen acute decompensation by reducing contractility in an already struggling heart. Initiate only after the patient is stabilized, euvolemic, and on stable doses of diuretics.",tag:"hf"},
{q:"BNP — what releases it and what does elevation mean?",a:"Ventricular WALL STRETCH → released during volume/pressure overload → HF biomarker",exp:"BNP antagonizes RAAS and SNS → promotes natriuresis and vasodilation. Elevated BNP = heart is being stretched from elevated filling pressures. Used to <strong>diagnose and monitor</strong> HF severity.",tag:"hf"},
{q:"Most common cause of right-sided heart failure?",a:"Left-sided heart failure (back-pressure from elevated LA → pulmonary HTN → RV overload)",exp:"LHF → ↑ pulmonary venous pressure → pulmonary HTN → RV pressure overload → RVH → RHF. Left = lungs. Right = rest of body (JVD, hepatomegaly, edema).",tag:"hf"},
{q:"Peripartum cardiomyopathy — time window?",a:"Last month of pregnancy to 5 months postpartum",exp:"Dilated CMP, low EF, clean coronaries, no prior cardiac history. Multifactorial. Within 5 months postpartum still qualifies — don't assume it must be idiopathic viral DCM just because delivery was weeks ago.",tag:"hf"},
{q:"Normal EF heart failure — what is this called and what causes it?",a:"HFpEF — caused by hypertension (concentric LVH), HCM, amyloid → stiff ventricle",exp:"The ventricle can squeeze but cannot <strong>relax and fill</strong> properly. Elevated filling pressures → pulmonary congestion → dyspnea despite EF ≥50%. TRAP: Normal EF ≠ normal heart.",tag:"hf"},

// PERICARDIAL
{q:"Pericarditis ECG — 3 key features?",a:"Diffuse ST elevation + PR depression (pathognomonic) + NO reciprocal ST changes",exp:"STEMI has localized ST elevation + <strong>reciprocal depressions</strong>. Pericarditis has <strong>diffuse</strong> elevation (nearly all leads) with <strong>no reciprocal changes</strong> + PR depression from atrial involvement. PR depression is unique to pericarditis.",tag:"peri"},
{q:"Beck's triad — components and diagnosis?",a:"Hypotension + JVD + Muffled heart sounds → Cardiac Tamponade",exp:"Pericardial fluid compresses the heart → ↓ filling → ↓ CO → shock. Additional clues: <strong>pulsus paradoxus</strong> >10 mmHg, electrical alternans on ECG, 'water-bottle' CXR silhouette. Treatment: <strong>pericardiocentesis</strong>.",tag:"peri"},
{q:"Electrical alternans — what is it and what does it indicate?",a:"Beat-to-beat alternation of QRS axis/amplitude on ECG → cardiac tamponade",exp:"The heart swings back and forth in a large pericardial effusion → the electrical axis alternates with each beat. Combined with Beck's triad = tamponade until proven otherwise.",tag:"peri"},
{q:"Kussmaul sign — what is it and what does it indicate?",a:"JVP RISES with inspiration → constrictive pericarditis",exp:"Normally, JVP falls with inspiration (↑ venous return is accommodated by RV expansion). In constrictive pericarditis, the <strong>rigid pericardium</strong> prevents RV expansion → RA pressure rises → JVP paradoxically increases.",tag:"peri"},
{q:"Constrictive pericarditis vs restrictive CMP — key distinguishing test?",a:"CT/MRI: constrictive = pericardial thickening. Cath: 'square root sign' with equalization of pressures.",exp:"Both cause impaired filling with normal EF. Constrictive = pericardial disease → <strong>surgically curable with pericardiectomy</strong>. RCM = myocardial disease → not surgically curable. CT showing calcified/thickened pericardium clinches constrictive pericarditis.",tag:"peri"},
{q:"Dressler syndrome — timing, mechanism, treatment?",a:"2–10 weeks post-MI → autoimmune pericarditis from anti-heart antibodies → treat with NSAIDs",exp:"Myocardial necrosis exposes antigens → anti-heart antibody formation. Presents with fever, pleuritic chest pain, friction rub, diffuse ST elevation, <strong>negative troponin</strong>. Negative troponin distinguishes from reinfarction.",tag:"peri"},
{q:"Acute pericarditis — most common cause and treatment?",a:"Viral (Coxsackie B most common) → NSAIDs + colchicine",exp:"Positional pain (worse lying flat, better leaning forward) + friction rub + diffuse ST elevation + PR depression. Most cases resolve with NSAIDs. Colchicine reduces recurrence risk. Avoid NSAIDs post-MI (can impair healing).",tag:"peri"},
{q:"JVD + hypotension post-MI with CLEAR lungs — think?",a:"Cardiac tamponade from free wall rupture — NOT heart failure",exp:"In HF, JVD accompanies pulmonary edema and crackles. <strong>Clear lungs + JVD + hypotension</strong> = tamponade every time. Free wall rupture occurs at 3–7 days (macrophage window). Pericardiocentesis is the urgent intervention.",tag:"peri"},
{q:"Pulsus paradoxus — definition and cause in tamponade?",a:">10 mmHg drop in systolic BP with inspiration → tamponade compresses RV, bowing septum into LV",exp:"Inspiration → ↑ right heart filling → in tamponade, fixed pericardial space means RV expansion bows interventricular septum left → ↓ LV filling → ↓ SBP. Exaggerated (>10 mmHg) version = pathologic.",tag:"peri"},

// AORTIC / VASCULAR
{q:"Type A vs Type B aortic dissection — management rule?",a:"Type A (ascending) = surgical emergency. Type B (descending) = medical management (labetalol).",exp:"Type A can extend to coronary ostia (MI), aortic root (AR), or pericardium (tamponade) → must be surgically repaired. Type B is managed with BP and HR control to reduce aortic wall stress. <strong>Labetalol</strong> is the agent of choice.",tag:"vasc"},
{q:"AAA surgical repair threshold?",a:">5 cm (or symptomatic at any size)",exp:"<4.5cm: surveillance. 5–6cm: ~11%/yr rupture risk. >6cm: >25%/yr. Surgical mortality ~5% vs rupture mortality >50–80%. Repair at >5 cm is the threshold where surgical risk becomes favorable.",tag:"vasc"},
{q:"Syphilitic aortitis — classic features?",a:"Tree-bark aorta + ascending aneurysm + AR from root dilation + vasa vasorum endarteritis",exp:"Tertiary syphilis → T. pallidum infects vasa vasorum → obliterative endarteritis → medial ischemia → elastic fiber loss → wrinkled 'tree-bark' intima → aneurysm. <strong>Always ascending aorta.</strong> Contrast with AAA (infrarenal, atherosclerotic).",tag:"vasc"},
{q:"Berry aneurysm — location, associations, and presentation?",a:"Circle of Willis bifurcations → ADPKD + coarctation → 'worst headache of life' (SAH)",exp:"Saccular (berry) aneurysms form at bifurcations due to congenital media defect. Rupture → <strong>subarachnoid hemorrhage</strong>: thunderclap headache + meningismus. CT negative early → LP shows xanthochromia + non-clearing RBCs. Not the same as Charcot-Bouchard (basal ganglia, HTN-related).",tag:"vasc"},
{q:"Charcot-Bouchard microaneurysm — where and why?",a:"Deep brain arterioles (basal ganglia, thalamus) → chronic HTN → lipohyalinosis → intracerebral hemorrhage",exp:"HTN → lipohyalinosis of small penetrating arterioles → microaneurysm formation → rupture → <strong>deep brain hemorrhage</strong>. Cocaine causes acute BP spike → rupture. Contrast with berry aneurysm (subarachnoid, Circle of Willis, congenital media defect).",tag:"vasc"},
{q:"Aortic dissection — most common risk factor overall?",a:"Chronic hypertension (most common). Young patient = Marfan/EDS (cystic medial degeneration).",exp:"HTN causes chronic shear stress → cystic medial degeneration → intimal tear → false lumen propagates. Marfan/EDS = connective tissue defect in fibrillin-1 → same result at younger age. Tearing/ripping chest pain radiating to back is classic.",tag:"vasc"},
{q:"Fibromuscular dysplasia — classic scenario?",a:"Young woman + secondary HTN + renal bruit + 'string of pearls' on angiography → FMD",exp:"Non-inflammatory, non-atherosclerotic medial hyperplasia of medium-sized arteries. Most commonly affects <strong>renal arteries</strong> (→ RAAS activation → HTN) and carotid arteries. String of pearls = alternating stenosis and dilation. Treated with angioplasty.",tag:"vasc"},
{q:"New AR in the setting of aortic dissection — mechanism?",a:"Dissection extends proximally → distorts aortic annulus → acute aortic regurgitation",exp:"Type A dissection can propagate to the aortic root → annular dilation → acute AR (early diastolic murmur at LSB + wide pulse pressure). This is an additional indication for emergent surgery. Marfan syndrome patients are at particular risk.",tag:"vasc"},

// VASCULITIS
{q:"Giant Cell Arteritis — most important immediate step?",a:"Start high-dose steroids BEFORE biopsy to prevent blindness",exp:"Temporal artery biopsy can be done within days of starting steroids (skip lesions remain visible). Never delay steroids waiting for biopsy — ophthalmic artery occlusion → <strong>permanent vision loss</strong>. Associated with polymyalgia rheumatica. ESR >50 in an elderly woman with jaw claudication = GCA until proven otherwise.",tag:"vas"},
{q:"Takayasu arteritis — classic patient and finding?",a:"Young Asian woman + pulseless upper extremities + arm-leg BP differential + granulomatous aortic inflammation",exp:"'Pulseless disease' — granulomatous inflammation of aorta and major branches. Causes stenosis → distal ischemia. Constitutional symptoms (fever, weight loss). Distinguish from GCA by age (Takayasu <40y, GCA >50y) and location (aortic branches vs temporal artery).",tag:"vas"},
{q:"Polyarteritis Nodosa — 3 key distinguishing features?",a:"ANCA negative + spares pulmonary arteries/glomeruli + Hepatitis B association",exp:"PAN is a medium vessel vasculitis with mesenteric, renal, and skin involvement. 'String of beads' on angiography. No ANCA (distinguishes from GPA/MPA). No pulmonary involvement (distinguishes from GPA/EGPA). No GN (distinguishes from GPA/MPA). Hep B antigen is the classic association.",tag:"vas"},
{q:"GPA (Wegener) — classic triad + ANCA type?",a:"Upper respiratory + lower respiratory + glomerulonephritis → c-ANCA (anti-PR3)",exp:"Saddle-nose deformity (cartilage destruction) + cavitary pulmonary nodules + GN with RBC casts + c-ANCA positive. Treat with cyclophosphamide + steroids. Distinguish from MPA (no upper respiratory, no granulomas, p-ANCA) and EGPA (asthma + eosinophilia, p-ANCA).",tag:"vas"},
{q:"EGPA (Churg-Strauss) — sentinel feature + ANCA type?",a:"Asthma + eosinophilia + vasculitis → p-ANCA (anti-MPO)",exp:"Late-onset asthma in an adult + eosinophilia + vasculitis = EGPA until proven otherwise. p-ANCA (MPO). Pulmonary infiltrates + mononeuritis multiplex are also seen. Steroid-dependent asthma that becomes hard to control = warning sign.",tag:"vas"},
{q:"Kawasaki disease — CRASH mnemonic?",a:"Conjunctivitis + Rash + Adenopathy + Strawberry tongue + Hand/foot changes",exp:"Fever >5 days + ≥4 CRASH criteria. Most common vasculitis in children. Leading cause of <strong>acquired coronary artery disease</strong> in children — coronary aneurysms from medium vessel vasculitis. Treat with IVIG + aspirin.",tag:"vas"},
{q:"Buerger disease — only effective treatment?",a:"Complete tobacco cessation — the only treatment that alters disease course",exp:"Young male smoker + distal limb ischemia + superficial thrombophlebitis + corkscrew collaterals on angiography. Non-atherosclerotic, non-autoimmune. Tobacco toxins → inflammatory thrombus + microabscesses. Immunosuppression and anticoagulation do not help. Stop smoking = stop progression.",tag:"vas"},
{q:"HSP (IgA vasculitis) — classic triad + biopsy finding?",a:"Palpable purpura (buttocks/legs) + arthritis + GI pain + hematuria → IgA mesangial deposits",exp:"Most common vasculitis in children. Follows URI (often streptococcal). Normal platelets (not ITP). IgA deposits in mesangium = shared pathology with IgA nephropathy (Berger disease). Usually self-limited in children.",tag:"vas"},
{q:"ANCA types — c-ANCA vs p-ANCA diseases?",a:"c-ANCA (PR3) = GPA (Wegener). p-ANCA (MPO) = MPA + EGPA (Churg-Strauss).",exp:"Mnemonic: <strong>c-ANCA = Cytoplasmic = Wegener's GPA</strong>. p-ANCA = Perinuclear = MPA and EGPA. PAN = ANCA negative. These are frequently tested on NBME exams — memorize the pairings.",tag:"vas"},
{q:"Which vasculitis spares pulmonary arteries AND glomeruli?",a:"Polyarteritis Nodosa (PAN) — medium vessel vasculitis",exp:"PAN involves mesenteric, renal, skin, and peripheral nerve vessels. No lungs, no GN. This is the key distinguisher from GPA (has both lung + GN), MPA (has both lung + GN), and EGPA (has lungs). PAN = GI + skin + kidney parenchyma (not glomeruli) + peripheral nerves.",tag:"vas"},
];

let cards=[...ALL_CARDS],current=0,flipped=false,known=[],review=[],currentFilter='all';

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  if(f==='review'){
    cards=review.length?[...review]:[];
    if(!cards.length){alert('No cards marked for review yet!');setFilter('all',document.querySelector('[data-f="all"]'));return}
  }else if(f==='all'){
    cards=[...ALL_CARDS];
  }else{
    cards=ALL_CARDS.filter(c=>c.tag===f);
  }
  shuffle(cards);current=0;known=[];review=[];showCard();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}}

function showCard(){
  const doneView=document.getElementById('done-view');
  const mainView=document.getElementById('main-view');
  if(current>=cards.length){
    mainView.style.display='none';doneView.style.display='flex';
    document.getElementById('done-know').textContent=known.length;
    document.getElementById('done-rev').textContent=review.length;
    return;
  }
  mainView.style.display='block';doneView.style.display='none';
  const c=cards[current];flipped=false;
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('q-text').textContent=c.q;
  document.getElementById('q-hint').textContent='';
  document.getElementById('a-text').textContent=c.a;
  document.getElementById('a-exp').innerHTML=c.exp?`<strong>Why:</strong> ${c.exp}`:'';
  const ft=document.getElementById('front-tag');
  const col=TAG_COLORS[c.tag]||'var(--hf)';
  ft.textContent=TAG_NAMES[c.tag]||c.tag.toUpperCase();
  ft.style.color=col;ft.style.background=col.replace(')',', 0.15)').replace('var(','rgba(').replace('var(','');
  // simpler approach:
  ft.style.background='rgba(255,255,255,0.08)';ft.style.color=col;ft.style.border=`1px solid ${col}`;
  document.getElementById('btn-rev').style.display='none';
  document.getElementById('btn-know').style.display='none';
  document.getElementById('counter').textContent=`Card ${current+1} of ${cards.length}`;
  const total=known.length+review.length;
  const pct=cards.length?(total/cards.length*100):0;
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('stat-rem').textContent=`${cards.length-current} remaining`;
  document.getElementById('stat-know').textContent=`${known.length} known`;
  document.getElementById('stat-rev').textContent=`${review.length} to review`;
}

function flip(){
  flipped=!flipped;
  document.getElementById('card-inner').classList.toggle('flipped',flipped);
  if(flipped){
    document.getElementById('btn-rev').style.display='flex';
    document.getElementById('btn-know').style.display='flex';
  }
}

function rate(r){
  if(r==='know')known.push(cards[current]);else review.push(cards[current]);
  current++;showCard();
}

function restartAll(){
  cards=currentFilter==='all'?[...ALL_CARDS]:ALL_CARDS.filter(c=>c.tag===currentFilter);
  shuffle(cards);current=0;known=[];review=[];showCard();
}

function restartReview(){
  if(!review.length){restartAll();return}
  cards=[...review];shuffle(cards);current=0;known=[];review=[];showCard();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();flip();}
  if(e.code==='ArrowRight'&&flipped)rate('know');
  if(e.code==='ArrowLeft'&&flipped)rate('review');
});

shuffle(cards);showCard();
</script>
</body>
</html>
