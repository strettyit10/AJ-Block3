  { number:1, cluster:"Statin MOA", objectives_tested:["LO1, LO3 — Mechanism of statins; HMG-CoA pathway"], stem:"A 52-year-old man with hypercholesterolemia is started on atorvastatin. After 6 weeks, his LDL has decreased from 185 mg/dL to 95 mg/dL. Which of the following best explains the primary mechanism by which atorvastatin reduces serum LDL levels?", choices:{ A:"Decreased intestinal absorption of dietary cholesterol", B:"Increased fecal excretion of bile acids", C:"Inhibition of HMG-CoA reductase leading to upregulation of hepatic LDL receptors", D:"Activation of lipoprotein lipase increasing VLDL clearance", E:"Inhibition of PCSK9 preventing LDL receptor degradation" }, correct:"C", tested_concept:"Statin MOA — HMG-CoA reductase inhibition → ↑ LDL receptors", why_correct:"Statins inhibit HMG-CoA reductase → ↓ hepatic cholesterol synthesis → compensatory ↑ LDL receptor expression → ↑ clearance of LDL from circulation. The upregulation of LDL receptors is the key step responsible for serum LDL reduction.", why_wrong:{ A:"Mechanism of ezetimibe (NPC1L1 blockade), not statins", B:"Mechanism of bile acid sequestrants", D:"Mechanism of fibrates (PPARα → ↑ LPL)", E:"Mechanism of PCSK9 inhibitors (evolocumab)" }, trap:"Students often stop at 'inhibit HMG-CoA reductase' without completing the chain — the LDL receptor upregulation is the reason serum LDL actually falls." },
  { number:2, cluster:"Fibrate Adverse Effect", objectives_tested:["LO4 — Adverse effects of fibrates; dangerous drug combinations"], stem:"A 61-year-old man with type 2 diabetes and mixed dyslipidemia is on rosuvastatin 20 mg/day. His TG remains at 650 mg/dL. His physician decides to add gemfibrozil. Three weeks later the patient presents with severe myalgias and CK of 8,500 U/L. Which of the following is the most likely explanation?", choices:{ A:"Rosuvastatin-induced direct mitochondrial toxicity unrelated to gemfibrozil", B:"Gemfibrozil inhibition of statin glucuronidation leading to elevated statin levels", C:"Gemfibrozil-induced PPARα activation causing muscle inflammation", D:"Additive renal toxicity from rosuvastatin and gemfibrozil", E:"Fibrate-induced hypothyroidism worsening dyslipidemia and causing myopathy" }, correct:"B", tested_concept:"Gemfibrozil inhibits glucuronidation of statins → ↑ statin levels → myopathy/rhabdomyolysis", why_correct:"Gemfibrozil inhibits the glucuronidation pathway (UGT enzymes) responsible for statin metabolism. This pharmacokinetic interaction raises statin plasma levels dramatically, causing myopathy and potentially rhabdomyolysis. This is why fenofibrate is preferred over gemfibrozil when a fibrate must be combined with a statin.", why_wrong:{ A:"Statins can cause myopathy, but the mechanism here is drug interaction — the timing (after adding gemfibrozil) is key", C:"PPARα activation does not directly cause myopathy", D:"Neither drug is primarily nephrotoxic at therapeutic doses in this context", E:"Gemfibrozil does not cause hypothyroidism" }, trap:"The question tests whether you know the specific mechanism (glucuronidation inhibition) rather than just knowing 'statin + fibrate = bad.'" },
  { number:3, cluster:"Bile Acid Sequestrants", objectives_tested:["LO3, LO4 — Bile acid sequestrant indications, adverse effects, contraindications"], stem:"A 28-year-old woman who is 16 weeks pregnant is found to have an LDL of 210 mg/dL on routine labs. She has no prior history of cardiovascular disease. Which of the following is the most appropriate pharmacological treatment?", choices:{ A:"Atorvastatin", B:"Gemfibrozil", C:"Cholestyramine", D:"Ezetimibe", E:"Evolocumab" }, correct:"C", tested_concept:"Bile acid sequestrants are safe in pregnancy; statins are teratogenic (Category X)", why_correct:"All statins are contraindicated in pregnancy (Category X — teratogenic). Bile acid sequestrants are not systemically absorbed and are considered safe in pregnancy. Cholestyramine is the appropriate choice for LDL reduction in a pregnant patient.", why_wrong:{ A:"Atorvastatin is Category X — absolutely contraindicated in pregnancy", B:"Gemfibrozil is not indicated for elevated LDL; safety in pregnancy not established", D:"Ezetimibe's safety in pregnancy is not established", E:"Evolocumab's safety in pregnancy is not established" }, trap:"On Step 1, whenever pregnancy + hypercholesterolemia appears → bile acid sequestrant. Statins = always contraindicated in pregnancy." },
  { number:4, cluster:"Drug Selection: Step-Up Therapy", objectives_tested:["LO3 — Pharmacological choices; step-up approach for LDL lowering"], stem:"A 67-year-old man with established ASCVD is on atorvastatin 80 mg/day (maximum dose). His LDL is 78 mg/dL and his goal is <70 mg/dL. He tolerates atorvastatin well. Which of the following is the most appropriate next step?", choices:{ A:"Switch to rosuvastatin 40 mg/day", B:"Add gemfibrozil", C:"Add ezetimibe", D:"Add cholestyramine", E:"Add evolocumab" }, correct:"C", tested_concept:"Ezetimibe is the first add-on agent when maximum-dose statin alone is insufficient", why_correct:"The step-up approach for LDL lowering: start with maximum-tolerated statin → add ezetimibe if goal not reached → add PCSK9 inhibitor if still not at goal. Ezetimibe is oral, inexpensive, well-tolerated, and provides an additional ~18–25% LDL reduction via complementary mechanism.", why_wrong:{ A:"Switching to rosuvastatin is not expected to provide significantly more LDL lowering than max-dose atorvastatin", B:"Gemfibrozil is for hypertriglyceridemia and is dangerous with statins", D:"Cholestyramine can be added but is less well-tolerated and less effective than ezetimibe as add-on", E:"Evolocumab is appropriate only after ezetimibe fails" }, trap:"Students may jump to PCSK9 inhibitor, but the correct step-up sequence is: max statin → ezetimibe → PCSK9 inhibitor." },
  { number:5, cluster:"Adverse Effects Comparison", objectives_tested:["LO4 — Recognize adverse effects of different lipid-lowering drugs"], stem:"A 55-year-old man with hypertriglyceridemia (TG 620 mg/dL) is started on fenofibrate. Six months later, he presents to his urologist with a new kidney stone and imaging reveals cholelithiasis. Which of the following best explains the gallstone formation?", choices:{ A:"Fenofibrate increases biliary cholesterol saturation by diverting excess cholesterol into bile", B:"Fenofibrate inhibits bile acid synthesis leading to bile stasis", C:"Fenofibrate causes increased intestinal cholesterol absorption", D:"Fenofibrate directly crystallizes in the gallbladder", E:"Fenofibrate causes dehydration leading to bile concentration" }, correct:"A", tested_concept:"Fibrates cause cholelithiasis by increasing biliary cholesterol secretion", why_correct:"Fibrates increase cholesterol excretion into bile (by reducing hepatic cholesterol esterification and increasing biliary cholesterol saturation). This supersaturates bile with cholesterol → promotes cholesterol gallstone formation.", why_wrong:{ B:"Fibrates do not inhibit bile acid synthesis — they activate PPARα", C:"Fibrates do not increase intestinal cholesterol absorption (that's the mechanism ezetimibe blocks)", D:"Drugs do not physically crystallize in the gallbladder", E:"Fenofibrate does not cause significant dehydration" }, trap:"Students confuse the mechanism — fibrates don't block bile acid synthesis, they increase biliary cholesterol saturation. The result is cholesterol gallstones." },
];

const DIAGRAMS = [
  { title:"Lipid-Lowering Drug Selection by Indication", type:"comparison", objectives:["LO3 — Pharmacological choices and advantages/disadvantages"], content:`┌──────────────────────┬──────────────┬──────────────┬────────────────┬──────────────────────┐\n│ Drug Class           │ ↓ LDL        │ ↓ TG         │ ↑ HDL          │ Best Use             │\n├──────────────────────┼──────────────┼──────────────┼────────────────┼──────────────────────┤\n│ Statins              │ ★★★★★ 30–50% │ ↓ modest     │ ↑ modest       │ 1st line: high LDL   │\n│ Bile acid sequestrant│ ★★★ 15–30%   │ ↑ (worsens!) │ ↑ modest       │ Pregnancy; add-on    │\n│ Ezetimibe            │ ★★ 18–25%    │ ↓ minimal    │ —              │ Add-on to statin     │\n│ Fibrates             │ ↑ (variable) │ ★★★★ 40–60%  │ ★★★ 10–20%     │ 1st line: high TG    │\n│ Omega-3 FA           │ may ↑ LDL    │ ★★★ 30–50%   │ ↑ modest       │ Severe hypertriglyd  │\n│ PCSK9 inhibitors     │ ★★★★★ 50–60% │ ↓ modest     │ ↑ modest       │ FH; add-on after max │\n└──────────────────────┴──────────────┴──────────────┴────────────────┴──────────────────────┘\n\nKEY RULES:\n• TG >500 mg/dL + pancreatitis risk → fibrate FIRST (not statin)\n• Bile acid sequestrants RAISE TG → contraindicated in hypertriglyceridemia\n• Pregnancy → bile acid sequestrant ONLY (statins = Category X)\n• Step-up: statin → + ezetimibe → + PCSK9 inhibitor` },
  { title:"Statin Step-Up & Dangerous Combinations", type:"flowchart", objectives:["LO3, LO4 — Statin therapy escalation; drug interactions"], content:`STEP-UP APPROACH FOR LDL LOWERING:\n  1. Start high-intensity statin (atorvastatin or rosuvastatin)\n        ↓ LDL goal not reached?\n  2. Add ezetimibe (oral, affordable, well-tolerated)\n        ↓ Still not at goal? (or statin intolerant)\n  3. Add PCSK9 inhibitor (evolocumab — injectable, expensive)\n\nSTATIN INTENSITY:\n  High    → atorvastatin 40–80mg, rosuvastatin 20–40mg  (LDL ↓ ≥50%)\n  Moderate → pravastatin, moderate-dose simvastatin      (LDL ↓ 30–50%)\n  Lower SE  → pravastatin (not CYP3A4; safest combo)\n  More SE   → simvastatin (avoid high doses; more interactions)\n\nDANGEROUS COMBINATIONS ✗\n  Simvastatin + gemfibrozil → rhabdomyolysis (CLASSIC)\n  Any statin + gemfibrozil  → ↑ rhabdomyolysis risk\n  Statins + CYP3A4 inhibitors (azoles, macrolides) → ↑ statin levels\n\nSAFE COMBINATIONS ✓\n  Any statin + ezetimibe    → additive LDL lowering\n  Any statin + fenofibrate  → safer than gemfibrozil combo\n  Any statin + bile acid sequestrant → additive (space doses)` },
  { title:"Adverse Effects Quick Reference", type:"comparison", objectives:["LO4 — Adverse effects of lipid-lowering drugs"], content:`DRUG                    KEY ADVERSE EFFECTS                    CLASSIC CLUE\n──────────────────────────────────────────────────────────────────────────────\nStatins (all)           Myopathy → rhabdomyolysis              ↑ CK + muscle pain\n                        ↑ LFTs (rare, monitor)                 Tea-colored urine = myoglobinuria\n                        Teratogenic (Category X)               Avoid in pregnancy\n\nSimvastatin (specific)  MORE myopathy risk                     Avoid with gemfibrozil\nPravastatin (specific)  LESS myopathy risk                     Safest with fibrates\n\nFibrates (all)          Myopathy (additive with statins)       ↑ CK\n                        Cholelithiasis (↑ biliary cholesterol)  Gallstones on imaging\nGemfibrozil (specific)  Inhibits statin glucuronidation        DO NOT combine with statins\nFenofibrate (specific)  Safer with statins                     Preferred fibrate in combo\n\nBile acid sequestrants  Constipation, bloating                 GI complaints\n                        ↑ TG (contraind. if TG elevated)       Can worsen hypertriglyceridemia\n                        Drug binding (warfarin, digoxin, etc.) Subtherapeutic drug levels\n                        ↓ Fat-soluble vitamins (A,D,E,K)       Space other drugs ≥4 hours\n\nEzetimibe               Generally well tolerated               Rare myopathy (additive)\n\nPCSK9 inhibitors        Injection site reactions               Injectable drug\n\nOmega-3 FA              GI upset, fishy aftertaste             Mild antiplatelet effect` },
  { title:"Primary vs. Secondary Hyperlipidemia", type:"comparison", objectives:["LO2 — Distinguish types of hyperlipidemias"], content:`SECONDARY CAUSES TO RULE OUT BEFORE STARTING THERAPY:\n  Hypothyroidism       → ↑ LDL (↓ LDL receptor expression)   → Check TSH\n  Diabetes mellitus    → ↑ TG, ↓ HDL                         → Check HbA1c/glucose\n  Nephrotic syndrome   → ↑ LDL, ↑ VLDL                       → Check urine protein\n  Chronic kidney disease → ↑ TG                               → Check GFR\n  Obesity              → ↑ TG, ↓ HDL                         → BMI, waist circumference\n  Alcohol excess       → ↑ TG, ↑ VLDL                        → History, LFTs\n  Medications          → Thiazides (↑ LDL, ↑ TG)             → Medication review\n                         β-blockers (↑ TG, ↓ HDL)\n                         Glucocorticoids (↑ LDL)\n\nPRIMARY (GENETIC) HYPERLIPIDEMIAS:\n  Familial hypercholesterolemia (FH)\n    → Autosomal dominant, ↓ LDL receptor\n    → LDL very high (>190 mg/dL); tendon xanthomas; premature ASCVD\n    → Tx: high-intensity statin + ezetimibe + PCSK9 inhibitor\n\n  Familial hypertriglyceridemia\n    → ↑ VLDL/TG; risk of pancreatitis\n    → Tx: fibrate or omega-3 FA` },
];

function AnglesTab() {
  return ANGLES.map((c,i) => (
    <Card key={i}>
      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Cluster ${c.number}`} color="purple"/>
        <span style={{ fontWeight:500, fontSize:15 }}>{c.theme}</span>
      </div>
      {c.objectives.map((o,j) => <p key={j} style={{ margin:"0 0 2px", fontSize:13, color:"var(--color-text-secondary)", paddingLeft:10, borderLeft:"2px solid #AFA9EC" }}>{o}</p>)}
      <Lbl t="Core mechanism"/><p style={{ fontSize:13, margin:"0 0 4px" }}>{c.mechanism}</p>
      <p style={{ fontSize:12, color:"var(--color-text-secondary)", fontStyle:"italic", margin:"0 0 10px" }}>{c.why_testable}</p>
      {c.angles.map((a,j) => (
        <Inset key={j}>
          <p style={{ fontWeight:500, fontSize:14, margin:"0 0 6px" }}>Angle {j+1}: {a.title}</p>
          {[["Tested concept",a.tested_concept],["Vignette pattern",a.vignette_pattern],["Key clues",a.key_clues],["Common trap",a.trap],["Disciplines",a.disciplines]].map(([l,v]) =>
            v ? <div key={l}><Lbl t={l}/><p style={{ fontSize:13, margin:"0 0 4px" }}>{v}</p></div> : null
          )}
        </Inset>
      ))}
    </Card>
  ));
}

function MindMapTab() {
  return MINDMAP.map((c,i) => (
    <Card key={i}>
      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Cluster ${c.number}`} color="teal"/>
        <span style={{ fontWeight:500, fontSize:15 }}>{c.theme}</span>
      </div>
      <p style={{ fontSize:13, color:"var(--color-text-secondary)", margin:"0 0 8px", paddingLeft:10, borderLeft:"2px solid #5DCAA5", fontStyle:"italic" }}>{c.mechanism}</p>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(140px,1fr))", gap:8, marginBottom:8 }}>
        {Object.entries(c.nodes).filter(([,v])=>v).map(([k,v]) => (
          <div key={k} style={{ background:"var(--color-background-secondary)", borderRadius:8, padding:"8px 10px" }}>
            <Lbl t={k}/><p style={{ fontSize:12, margin:0 }}>{v}</p>
          </div>
        ))}
      </div>
      <Lbl t="Links to"/>{c.links.map((l,j) => <Pill key={j} text={l} color="teal"/>)}
    </Card>
  ));
}

function StudyGuideTab() {
  return STUDYGUIDE.map((s,i) => (
    <Card key={i}>
      <Lbl t="Objectives covered"/>
      {s.objectives.map((o,j) => <p key={j} style={{ fontSize:13, color:"var(--color-text-secondary)", margin:"0 0 2px", paddingLeft:10, borderLeft:"2px solid #7F77DD" }}>{o}</p>)}
      <Lbl t="Core mechanism"/><p style={{ fontSize:14, fontWeight:500, margin:"0 0 8px" }}>{s.mechanism}</p>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        <div><Lbl t="High-yield facts"/>{s.high_yield_facts.map((f,j) => <p key={j} style={{ fontSize:13, margin:"0 0 3px" }}>• {f}</p>)}</div>
        <div><Lbl t="Vignette clues"/>{s.vignette_clues.map((f,j) => <p key={j} style={{ fontSize:13, margin:"0 0 3px" }}>• {f}</p>)}</div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginTop:8 }}>
        <div style={{ background:T.coral.bg, borderRadius:8, padding:"8px 10px" }}><Lbl t="Common trap"/><p style={{ fontSize:13, color:T.coral.txt, margin:0 }}>{s.trap}</p></div>
        <div style={{ background:T.teal.bg, borderRadius:8, padding:"8px 10px" }}><Lbl t="If you see → think"/><p style={{ fontSize:13, color:T.teal.txt, margin:0 }}>{s.if_you_see}</p></div>
      </div>
      <Lbl t="Integration links"/>{s.integration.map((l,j) => <Pill key={j} text={l} color="blue"/>)}
    </Card>
  ));
}

function VignettesTab() {
  const [open, setOpen] = useState({});
  return VIGNETTES.map((v,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:8 }}>
        <Pill text={`Vignette ${v.number}`} color="blue"/><Pill text={v.cluster} color="purple"/>
      </div>
      <Inset><p style={{ fontSize:13, lineHeight:1.7, margin:"0 0 8px" }}>{v.vignette}</p><p style={{ fontSize:14, fontWeight:500, margin:0 }}>{v.question}</p></Inset>
      <button onClick={()=>setOpen(o=>({...o,[i]:!o[i]}))} style={{ marginTop:10, fontSize:13, padding:"6px 14px", cursor:"pointer", borderRadius:6, background:"transparent", border:"0.5px solid var(--color-border-secondary)", color:"var(--color-text-primary)" }}>
        {open[i]?"Hide answer ↑":"Show answer ↓"}
      </button>
      {open[i] && (
        <div style={{ marginTop:8 }}>
          <div style={{ background:T.green.bg, borderRadius:8, padding:"8px 12px", marginBottom:8 }}>
            <Lbl t="Correct answer"/><p style={{ fontSize:13, fontWeight:500, color:T.green.txt, margin:0 }}>{v.answer}</p>
          </div>
          {[["Why correct",v.why_correct],["Key clues",v.key_clues],["Why a student might miss it",v.why_missed],["Exam writer trap",v.trap]].map(([l,val]) =>
            val ? <div key={l}><Lbl t={l}/><p style={{ fontSize:13, margin:"0 0 6px" }}>{val}</p></div> : null
          )}
        </div>
      )}
    </Card>
  ));
}

function QuestionsTab() {
  const [sel, setSel] = useState({});
  const [shown, setShown] = useState({});
  return QUESTIONS.map((q,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Q${q.number}`} color="amber"/><Pill text={q.cluster} color="amber"/>
      </div>
      <p style={{ fontSize:14, lineHeight:1.7, margin:"10px 0" }}>{q.stem}</p>
      {Object.entries(q.choices).map(([letter,txt]) => {
        const picked=sel[i]===letter, revealed=shown[i], isCorrect=letter===q.correct;
        let bg="var(--color-background-secondary)", border="0.5px solid var(--color-border-tertiary)";
        if(!revealed&&picked){bg=T.blue.bg;border=`0.5px solid ${T.blue.bdr}`;}
        if(revealed&&isCorrect){bg=T.green.bg;border=`0.5px solid ${T.green.bdr}`;}
        if(revealed&&picked&&!isCorrect){bg=T.red.bg;border=`0.5px solid ${T.red.bdr}`;}
        return <div key={letter} onClick={()=>!revealed&&setSel(s=>({...s,[i]:letter}))} style={{ background:bg, border, borderRadius:8, padding:"8px 12px", marginBottom:4, cursor:revealed?"default":"pointer", display:"flex", gap:10 }}>
          <span style={{ fontWeight:500, fontSize:13, minWidth:16 }}>{letter}.</span>
          <span style={{ fontSize:13 }}>{txt}</span>
        </div>;
      })}
      <button disabled={!sel[i]||shown[i]} onClick={()=>setShown(s=>({...s,[i]:true}))} style={{ marginTop:6, padding:"6px 14px", borderRadius:6, fontSize:13, cursor:sel[i]&&!shown[i]?"pointer":"default", background:sel[i]&&!shown[i]?T.blue.bg:"var(--color-background-secondary)", color:sel[i]&&!shown[i]?T.blue.txt:"var(--color-text-tertiary)", border:`0.5px solid ${sel[i]&&!shown[i]?T.blue.bdr:"var(--color-border-tertiary)"}` }}>
        Submit answer
      </button>
      {shown[i] && (
        <div style={{ marginTop:8 }}>
          <div style={{ background:T.green.bg, borderRadius:8, padding:"8px 12px", marginBottom:6 }}>
            <Lbl t="Correct answer"/>
            <p style={{ fontSize:13, fontWeight:500, color:T.green.txt, margin:"0 0 2px" }}>{q.correct} — {q.tested_concept}</p>
            <p style={{ fontSize:13, color:T.green.txt, margin:0 }}>{q.why_correct}</p>
          </div>
          {Object.entries(q.why_wrong).map(([l,e]) => <p key={l} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px" }}><strong>{l}:</strong> {e}</p>)}
          <div style={{ background:T.coral.bg, borderRadius:8, padding:"8px 12px", marginTop:6 }}>
            <Lbl t="Main trap"/><p style={{ fontSize:13, color:T.coral.txt, margin:0 }}>{q.trap}</p>
          </div>
        </div>
      )}
    </Card>
  ));
}

function DiagramsTab() {
  return DIAGRAMS.map((d,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center", marginBottom:6 }}>
        <Pill text={d.type} color="pink"/><span style={{ fontWeight:500, fontSize:15 }}>{d.title}</span>
      </div>
      {d.objectives.map((o,j) => <p key={j} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px", paddingLeft:8, borderLeft:"2px solid #ED93B1" }}>{o}</p>)}
      <pre style={{ background:"var(--color-background-secondary)", borderRadius:8, padding:"12px", marginTop:8, fontSize:12, color:"var(--color-text-primary)", whiteSpace:"pre-wrap", fontFamily:"monospace", lineHeight:1.7, overflowX:"auto" }}>{d.content}</pre>
    </Card>
  ));
}

const STUDY_RENDERERS = { angles:AnglesTab, mindmap:MindMapTab, studyguide:StudyGuideTab, vignettes:VignettesTab, questions:QuestionsTab, diagrams:DiagramsTab };

function App() {
  const [activeTab, setActiveTab] = useState("angles");
  const Comp = STUDY_RENDERERS[activeTab];
  return (
    <div style={{ padding:"0.5rem 0.75rem", maxWidth:860, margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div>
          <p style={{ fontSize:15, fontWeight:500, margin:0 }}>💊 Lipid Lowering Drugs</p>
          <p style={{ fontSize:11, color:"var(--color-text-secondary)", margin:0 }}>Georgetown SOM · Cardio Exam 2</p>
        </div>
      </div>
      <div style={{ display:"flex", gap:4, overflowX:"auto", paddingBottom:6, marginBottom:12 }}>
        {STUDY_TABS.map(t => {
          const active=activeTab===t.id;
          return <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ flexShrink:0, padding:"5px 12px", borderRadius:8, border:active?`1px solid ${T.purple.bdr}`:"0.5px solid var(--color-border-tertiary)", background:active?T.purple.bg:"transparent", color:active?T.purple.txt:"var(--color-text-secondary)", fontSize:12, fontWeight:active?500:400, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:13 }}>{t.icon}</span>{t.label}
          </button>;
        })}
      </div>
      <Comp/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
