const VIGNETTES = [
  { number:1, cluster:"Digoxin Toxicity", objectives_tested:["LO10: MOA of digoxin; LO14: Loop diuretics and electrolyte effects"], vignette:"A 74-year-old woman with HFrEF and atrial fibrillation is on digoxin 0.25 mg/day, furosemide 40 mg/day, and lisinopril. She presents with 3 days of nausea, loss of appetite, and seeing yellow-green halos around lights. Her heart rate is 44 bpm. Labs: K⁺ 2.8 mEq/L (normal 3.5–5.0), digoxin level 2.4 ng/mL, creatinine 1.0 mg/dL.", question:"Which of the following best explains why this patient is experiencing digoxin toxicity despite a 'normal' digoxin dose?", answer:"Furosemide-induced hypokalemia reduces competition at Na/K-ATPase, increasing digoxin binding and effect, precipitating toxicity at a dose that would otherwise be therapeutic.", why_correct:"K⁺ and digoxin compete for the same binding site on Na/K-ATPase. When K⁺ is low (hypokalemia from furosemide), digoxin has less competition → increased Na/K-ATPase inhibition → toxicity even at 'normal' levels.", key_clues:"Furosemide → hypokalemia (K⁺ 2.8) → ↑ digoxin effect → toxicity. Classic triad: yellow-green visual halos + bradycardia + GI symptoms = digoxin toxicity.", why_missed:"Students may focus on the digoxin level and miss the underlying mechanism (hypokalemia from furosemide). The level is elevated because of reduced competition at the receptor.", trap:"The digoxin level of 2.4 confirms toxicity, but the MECHANISM asked is the pharmacodynamic interaction with hypokalemia — not simply 'too high a dose.'" },
  { number:2, cluster:"ARNI Washout Requirement", objectives_tested:["LO4: MOA and role of ARNI; LO3: ACEi mechanism"], vignette:"A 58-year-old man with HFrEF (EF 30%) has been well-controlled on lisinopril 10 mg/day, carvedilol, and spironolactone for 2 years. His cardiologist decides to upgrade his therapy to sacubitril/valsartan. Lisinopril is stopped on Monday morning, and sacubitril/valsartan is started Monday evening (approximately 12 hours later). The following day, he develops severe facial and tongue swelling requiring emergent intubation.", question:"Which of the following best explains the mechanism of the life-threatening adverse event in this patient?", answer:"Insufficient washout between ACEi and ARNI led to accumulation of bradykinin: ACEi blocks bradykinin degradation, and sacubitril (neprilysin inhibitor) also prevents bradykinin breakdown, resulting in severe angioedema.", why_correct:"ACE normally degrades bradykinin. ACEi → ↑ bradykinin. Neprilysin (blocked by sacubitril) also degrades bradykinin. Combining both → massive bradykinin accumulation → severe angioedema. A 36-hour washout period is required.", key_clues:"<36-hr washout between ACEi and ARNI + facial/tongue swelling = angioedema from dual bradykinin accumulation. Life-threatening.", why_missed:"Students may know ARNI is contraindicated with ACEi but not know the specific mechanism (dual bradykinin accumulation) or the exact washout period (36 hours).", trap:"The 36-hour rule is absolute. Even if the patient is stable and the clinical benefit is clear, starting ARNI too early after ACEi can be fatal." },
  { number:3, cluster:"HFpEF Management", objectives_tested:["LO12: Difference between systolic and diastolic HF management"], vignette:"A 70-year-old woman with hypertension, obesity, and type 2 diabetes presents with progressive dyspnea on exertion and lower extremity edema. Echocardiogram shows EF of 62%, with evidence of diastolic dysfunction and elevated filling pressures. She is not currently on any cardiac medications.", question:"Which of the following medications has demonstrated a reduction in HF hospitalizations and mortality in patients with this type of heart failure?", answer:"SGLT-2 inhibitor (empagliflozin or dapagliflozin) — the only drug class with proven mortality benefit in HFpEF.", why_correct:"HFpEF (preserved EF ≥50%) has very limited pharmacological options for improving mortality. SGLT-2 inhibitors are the only class proven to reduce HF hospitalizations and cardiovascular death in HFpEF patients (EMPEROR-Preserved trial).", key_clues:"EF ≥50% + diastolic dysfunction + symptoms = HFpEF. SGLT-2i are the only proven mortality-reducing drugs in HFpEF.", why_missed:"Students may choose ACEi/ARB, β-blocker, or MRA — all of which have evidence only in HFrEF, not HFpEF.", trap:"All the proven HFrEF drugs (ACEi, ARBs, β-blockers, MRAs) do NOT have mortality benefit in HFpEF — except SGLT-2 inhibitors." },

const QUESTIONS = [
  { number:1, cluster:"β-Blocker Paradox in HF", objectives_tested:["LO6: Role of β-blockers in HF treatment"], stem:"A 55-year-old man with newly diagnosed HFrEF (EF 25%) is started on carvedilol in addition to lisinopril and furosemide. His physician explains that despite being a negative inotrope, carvedilol will improve his cardiac function over time. Which of the following best explains this paradox?", choices:{ A:"Carvedilol acutely increases contractility by blocking α₁ receptors in the heart", B:"Chronic β-blockade counteracts catecholamine-mediated cardiac remodeling, leading to gradual improvement in EF", C:"Carvedilol stimulates β₂ receptors in the heart, improving diastolic relaxation", D:"β-blockade increases preload by causing sodium retention", E:"Carvedilol inhibits aldosterone release, reducing volume overload" }, correct:"B", tested_concept:"β-blocker paradox: negative inotropes that improve EF by reversing remodeling", why_correct:"In HFrEF, chronic sympathetic activation is harmful — it drives cardiac remodeling (hypertrophy, fibrosis, apoptosis). By blocking this chronic catecholamine excess, β-blockers allow reverse remodeling over weeks to months, resulting in improved EF despite being negative inotropes acutely.", why_wrong:{ A:"α₁ blockade causes vasodilation (↓ afterload), not ↑ contractility", C:"Carvedilol blocks β₂ receptors; it doesn't stimulate them", D:"β-blockade does not increase Na retention; that's the RAAS role", E:"Aldosterone inhibition is the role of MRAs, not β-blockers" }, trap:"Students who know β-blockers reduce contractility may think they are harmful in HF — the key is the long-term reversal of neurohormonal remodeling, not the acute hemodynamic effect." },
  { number:2, cluster:"RAAS Drug Interactions", objectives_tested:["LO3, LO5 — ACEi/ARBs and MRAs; hyperkalemia risk"], stem:"A 62-year-old woman with HFrEF is on lisinopril 10 mg/day, carvedilol, and spironolactone 25 mg/day. Her K⁺ is 4.9 mEq/L. Her physician considers adding losartan for additional RAAS blockade. Which of the following is the most important reason to avoid this addition?", choices:{ A:"Losartan and lisinopril have opposing mechanisms and will cancel out each other's effects", B:"The combination of ACEi, ARB, and MRA substantially increases the risk of life-threatening hyperkalemia and AKI", C:"Losartan is contraindicated in patients already receiving a β-blocker", D:"Adding an ARB will worsen cardiac remodeling by blocking AT2 receptors", E:"Losartan requires dose adjustment when used with spironolactone due to CYP3A4 interactions" }, correct:"B", tested_concept:"Triple RAAS blockade (ACEi + ARB + MRA) → severe hyperkalemia and AKI", why_correct:"Triple RAAS blockade (ACEi + ARB + MRA) dramatically increases the risk of hyperkalemia and AKI without providing additional mortality benefit. This combination is explicitly contraindicated. The patient's K⁺ is already borderline at 4.9 mEq/L.", why_wrong:{ A:"They have complementary, not opposing mechanisms — but this isn't the reason to avoid the combination", C:"No interaction between ARBs and β-blockers", D:"AT2 receptor stimulation is generally cardioprotective; ARBs block AT1 (not AT2)", E:"No clinically significant CYP interaction between losartan and spironolactone" }, trap:"Students may think that adding more RAAS blockade = more benefit. The evidence shows ACEi + ARB combination provides no additional mortality benefit and significantly increases harm." },
  { number:3, cluster:"Spironolactone vs. Eplerenone", objectives_tested:["LO5: Role of aldosterone in HF; MRA adverse effects"], stem:"A 48-year-old man with HFrEF is started on spironolactone 25 mg/day in addition to his ACEi and β-blocker. Three months later, he complains of bilateral breast tenderness and sexual dysfunction. Which of the following changes would best address these side effects while maintaining therapeutic benefit?", choices:{ A:"Reduce spironolactone dose to 12.5 mg/day", B:"Add testosterone supplementation to counteract the hormonal effects", C:"Switch to eplerenone, a selective mineralocorticoid receptor antagonist", D:"Switch to furosemide to provide equivalent diuretic benefit", E:"Add an ACEi dose increase to compensate for reduced MRA effect" }, correct:"C", tested_concept:"Spironolactone (non-selective MRA) → sex hormone side effects; eplerenone (selective) avoids these", why_correct:"Spironolactone is non-selective — it blocks mineralocorticoid, androgen, and progesterone receptors. Anti-androgenic effects → gynecomastia, impotence. Eplerenone is a selective MRA with no sex hormone receptor activity.", why_wrong:{ A:"Reducing the dose may partially reduce side effects but at the cost of therapeutic efficacy", B:"Testosterone supplementation is not an appropriate management strategy", D:"Furosemide does not block aldosterone's fibrotic/remodeling effects on the heart", E:"Increasing ACEi dose does not substitute for aldosterone blockade" }, trap:"Students may choose dose reduction — but the correct answer is switching to eplerenone, which provides equivalent HF benefit without the sex hormone side effects." },
  { number:4, cluster:"Acute Decompensated HF", objectives_tested:["LO13: Management of ADHF; LO14: Role of diuretics"], stem:"A 67-year-old man with known HFrEF presents to the ER with sudden worsening dyspnea, orthopnea, bilateral crackles to the lung apices, and O₂ saturation of 86% on room air. He has 4+ pitting edema to his thighs. BP 155/95 mmHg, HR 102 bpm, RR 28/min. His home medications include carvedilol, lisinopril, and spironolactone. Which of the following is the most appropriate immediate pharmacological intervention?", choices:{ A:"Increase carvedilol dose to control heart rate", B:"Add sacubitril/valsartan to improve cardiac remodeling", C:"IV furosemide to rapidly reduce volume overload and improve pulmonary congestion", D:"Start dobutamine to improve cardiac output", E:"Add digoxin to increase contractility" }, correct:"C", tested_concept:"ADHF management: IV loop diuretic is immediate first-line for volume overload/pulmonary edema", why_correct:"This patient has acute decompensated HF with pulmonary edema, systemic volume overload, and hypertension. IV furosemide provides rapid diuresis, reduces preload, and relieves pulmonary congestion.", why_wrong:{ A:"Increasing carvedilol during acute decompensation can worsen hemodynamics — never up-titrate β-blocker in ADHF", B:"ARNI is a long-term disease-modifying therapy, not for acute stabilization", D:"Dobutamine is used in cardiogenic shock with low CO, not in this patient who has preserved BP", E:"Digoxin is not appropriate for acute management and has no role in acute pulmonary edema" }, trap:"Never increase or start β-blocker in ADHF. The reflex to use dobutamine is wrong here — the patient's BP is 155/95, not in shock. IV diuretic is the answer." },

const DIAGRAMS = [
  { title:"HFrEF Drug Hierarchy: Survival Benefit vs. Symptom Relief", type:"pathway", objectives:["LO2, LO6, LO3, LO4, LO5, LO9 — Disease-modifying vs. symptom-relieving drugs"], content:`MORTALITY-REDUCING DRUGS (disease-modifying) ✓\n  ┌─────────────────────────────────────────────────────────────────┐\n  │ 1. ACEi (enalapril, lisinopril, captopril)                      │\n  │    OR ARB (losartan) if ACEi not tolerated                      │\n  │    OR ARNI (sacubitril/valsartan) → preferred over ACEi/ARB     │\n  │ 2. β-Blocker: carvedilol, metoprolol succinate, bisoprolol ONLY │\n  │ 3. MRA: spironolactone or eplerenone                            │\n  │ 4. SGLT-2i: empagliflozin or dapagliflozin                      │\n  │    (also benefit in HFpEF — unique!)                            │\n  └─────────────────────────────────────────────────────────────────┘\n\nSYMPTOM RELIEF ONLY (no mortality benefit in HFrEF)\n  ┌─────────────────────────────────────────────────────────────────┐\n  │ Loop diuretics (furosemide, torsemide) → ↓ congestion          │\n  │ Digoxin → ↓ hospitalizations, ↑ symptoms (NOT survival)        │\n  │ Thiazides (HCTZ, metolazone) → add-on diuresis                 │\n  └─────────────────────────────────────────────────────────────────┘\n\nADD-ON / SPECIAL INDICATIONS\n  Ivabradine → HR ≥70 in sinus rhythm on max β-blocker\n  Hydralazine/ISDN → ACEi/ARB/ARNI intolerant OR Black patients\n  Vericiquat → sGC stimulator; recent hospitalization, residual symptoms` },
  { title:"HFrEF vs. HFpEF: Key Differences in Management", type:"comparison", objectives:["LO12 — Systolic vs. diastolic HF management"], content:`                    HFrEF (EF <40%)              HFpEF (EF ≥50%)\n─────────────────────────────────────────────────────────────────────\nPathophysiology     Systolic dysfunction          Diastolic dysfunction\n                    ↓ contractility               ↓ relaxation, ↑ stiffness\nEF                  <40% (reduced)                ≥50% (preserved)\nClassic patient     Dilated, thin-walled ventricle Hypertrophied, thick-walled\nCommon causes       MI, dilated CMP, LBBB         HTN, obesity, DM, aging\n\nDRUGS WITH MORTALITY BENEFIT:\nACEi/ARB/ARNI       ✓ YES (cornerstone)           ✗ NO proven benefit\nβ-blockers          ✓ YES (3 specific drugs)       ✗ NO proven benefit\nMRAs                ✓ YES                          ✗ NO proven benefit\nSGLT-2 inhibitors   ✓ YES                          ✓ YES (unique!)\nDigoxin             Symptoms only (no mortality)   Not recommended\n\nHFpEF treatment: (1) Diuretics for congestion\n                 (2) Treat underlying causes: HTN, Afib rate control, DM\n                 (3) SGLT-2i for mortality benefit\n                 (4) MRAs may reduce hospitalizations (less clear)` },
  { title:"RAAS Cascade and Drug Targets", type:"flowchart", objectives:["LO3, LO4, LO5 — ACEi, ARBs, ARNI, MRA mechanisms"], content:`Liver → Angiotensinogen\n         ↓ Renin (from kidney)\n        Angiotensin I\n         ↓ ACE (in lung) ← BLOCKED by ACEi (enalapril, lisinopril, captopril)\n        Angiotensin II\n         ↓ AT1 receptor ← BLOCKED by ARBs (losartan) and ARNI (valsartan)\n         ├→ Vasoconstriction (↑ SVR → ↑ afterload)\n         ├→ Aldosterone release → Na/water retention → ↑ preload\n         │     ↓ Aldosterone receptor ← BLOCKED by MRAs (spironolactone, eplerenone)\n         └→ Cardiac/vascular fibrosis and remodeling\n\nNATRIURETIC PEPTIDES (counterbalance):\n  ANP/BNP → ↑ cGMP → vasodilation + natriuresis + ↓ remodeling\n    ↓ Neprilysin (degrades ANP/BNP) ← BLOCKED by sacubitril (ARNI component)\n  → ARNI = sacubitril + valsartan = ↑ NP effects + ↓ Ang II effects\n\nACEi ALSO: ↑ bradykinin (ACE normally degrades it)\n  → vasodilation (therapeutic) + cough/angioedema (adverse)\n  → NEVER combine ARNI + ACEi (dual bradykinin ↑ → angioedema)` },
  { title:"Digoxin Toxicity: Mechanism and Risk Factors", type:"flowchart", objectives:["LO10 — Digoxin MOA; LO14 — Loop diuretics and electrolyte effects"], content:`DIGOXIN MECHANISM:\n  Digoxin → Inhibits Na/K-ATPase\n    → ↑ intracellular Na⁺\n    → Reverse NCX (Na out, Ca in)\n    → ↑ intracellular Ca²⁺\n    → ↑ Inotropy + Vagomimetic (↓ HR, ↓ AV conduction)\n\nTOXICITY RISK FACTORS:\n  Hypokalemia (K⁺ competes at Na/K-ATPase)     ← FUROSEMIDE\n  Hypomagnesemia                                ← FUROSEMIDE\n  Hypercalcemia\n  Renal failure (↓ digoxin clearance)\n  Elderly (↓ renal function, ↓ Vd)\n  High digoxin level (>0.9 ng/mL for HF)\n\nTOXICITY SIGNS (classic triad):\n  GI:     Nausea, vomiting, anorexia\n  CNS:    Yellow-green visual halos, confusion, fatigue\n  Cardiac: Bradycardia, AV block, ANY arrhythmia\n\nMANAGEMENT:\n  Stop digoxin → correct hypokalemia → Digibind (anti-digoxin Fab) for severe toxicity\n  KEY: NEVER cardiovert VF from digoxin toxicity with electricity (→ asystole)` },
];

function QuestionsTab() {
  const [sel, setSel] = useState({});
  const [shown, setShown] = useState({});
  return QUESTIONS.map((q,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Q${q.number}`} color="amber"/><Pill text={q.cluster} color="amber"/>
      </div>
      <p style={{ fontSize:14, lineHeight:1.7, margin:"10px 0" }}>{q.stem}</p>
      {Object.entries(q.choices).map(([letter,txt]) => {
        const picked=sel[i]===letter, revealed=shown[i], isCorrect=letter===q.correct;
        let bg="var(--color-background-secondary)", border="0.5px solid var(--color-border-tertiary)";
        if(!revealed&&picked){bg=T.blue.bg;border=`0.5px solid ${T.blue.bdr}`;}
        if(revealed&&isCorrect){bg=T.green.bg;border=`0.5px solid ${T.green.bdr}`;}
        if(revealed&&picked&&!isCorrect){bg=T.red.bg;border=`0.5px solid ${T.red.bdr}`;}
        return <div key={letter} onClick={()=>!revealed&&setSel(s=>({...s,[i]:letter}))} style={{ background:bg, border, borderRadius:8, padding:"8px 12px", marginBottom:4, cursor:revealed?"default":"pointer", display:"flex", gap:10 }}>
          <span style={{ fontWeight:500, fontSize:13, minWidth:16 }}>{letter}.</span>
          <span style={{ fontSize:13 }}>{txt}</span>
        </div>;
      })}
      <button disabled={!sel[i]||shown[i]} onClick={()=>setShown(s=>({...s,[i]:true}))} style={{ marginTop:6, padding:"6px 14px", borderRadius:6, fontSize:13, cursor:sel[i]&&!shown[i]?"pointer":"default", background:sel[i]&&!shown[i]?T.blue.bg:"var(--color-background-secondary)", color:sel[i]&&!shown[i]?T.blue.txt:"var(--color-text-tertiary)", border:`0.5px solid ${sel[i]&&!shown[i]?T.blue.bdr:"var(--color-border-tertiary)"}` }}>
        Submit answer
      </button>
      {shown[i] && (
        <div style={{ marginTop:8 }}>
          <div style={{ background:T.green.bg, borderRadius:8, padding:"8px 12px", marginBottom:6 }}>
            <Lbl t="Correct answer"/>
            <p style={{ fontSize:13, fontWeight:500, color:T.green.txt, margin:"0 0 2px" }}>{q.correct} — {q.tested_concept}</p>
            <p style={{ fontSize:13, color:T.green.txt, margin:0 }}>{q.why_correct}</p>
          </div>
          {Object.entries(q.why_wrong).map(([l,e]) => <p key={l} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px" }}><strong>{l}:</strong> {e}</p>)}
          <div style={{ background:T.coral.bg, borderRadius:8, padding:"8px 12px", marginTop:6 }}>
            <Lbl t="Main trap"/><p style={{ fontSize:13, color:T.coral.txt, margin:0 }}>{q.trap}</p>
          </div>
        </div>
      )}
    </Card>
  ));
}

function DiagramsTab() {
  return DIAGRAMS.map((d,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center", marginBottom:6 }}>
        <Pill text={d.type} color="pink"/><span style={{ fontWeight:500, fontSize:15 }}>{d.title}</span>
      </div>
      {d.objectives.map((o,j) => <p key={j} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px", paddingLeft:8, borderLeft:"2px solid #ED93B1" }}>{o}</p>)}
      <pre style={{ background:"var(--color-background-secondary)", borderRadius:8, padding:"12px", marginTop:8, fontSize:12, color:"var(--color-text-primary)", whiteSpace:"pre-wrap", fontFamily:"monospace", lineHeight:1.7, overflowX:"auto" }}>{d.content}</pre>
    </Card>
  ));
}

const STUDY_RENDERERS = { angles:AnglesTab, mindmap:MindMapTab, studyguide:StudyGuideTab, vignettes:VignettesTab, questions:QuestionsTab, diagrams:DiagramsTab };

function App() {
  const [activeTab, setActiveTab] = useState("angles");
  const Comp = STUDY_RENDERERS[activeTab];
  return (
    <div style={{ padding:"0.5rem 0.75rem", maxWidth:860, margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div>
          <p style={{ fontSize:15, fontWeight:500, margin:0 }}>❤️ Treatment of Heart Failure I &amp; II</p>
          <p style={{ fontSize:11, color:"var(--color-text-secondary)", margin:0 }}>Georgetown SOM · Cardio Exam 2</p>
        </div>
      </div>
      <div style={{ display:"flex", gap:4, overflowX:"auto", paddingBottom:6, marginBottom:12 }}>
        {STUDY_TABS.map(t => {
          const active=activeTab===t.id;
          return <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ flexShrink:0, padding:"5px 12px", borderRadius:8, border:active?`1px solid ${T.purple.bdr}`:"0.5px solid var(--color-border-tertiary)", background:active?T.purple.bg:"transparent", color:active?T.purple.txt:"var(--color-text-secondary)", fontSize:12, fontWeight:active?500:400, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:13 }}>{t.icon}</span>{t.label}
          </button>;
        })}
      </div>
      <Comp/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
