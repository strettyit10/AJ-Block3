const VIGNETTES = [
  { number:1, cluster:"Amiodarone Toxicity", objectives_tested:["Identify most common side effects, limitations and toxicities of antiarrhythmic drugs"], vignette:"A 68-year-old man with a history of persistent atrial fibrillation has been taking amiodarone 200 mg daily for 4 years. He presents with a 3-month history of progressive exertional dyspnea, dry cough, and a 10-pound weight loss. Chest X-ray shows bilateral interstitial infiltrates. PFTs reveal a restrictive pattern with decreased DLCO. His INR has risen from 2.3 to 4.8 over the past 2 months despite no change in his warfarin dose.", question:"Which of the following best explains both the pulmonary findings and the change in his INR?", answer:"Amiodarone-induced pulmonary toxicity (interstitial pneumonitis) and inhibition of CYP2C9, which increases warfarin levels.", why_correct:"Amiodarone accumulates in lung tissue causing interstitial pneumonitis — the most serious adverse effect. It also inhibits CYP2C9, the primary enzyme metabolizing warfarin (S-warfarin), leading to increased warfarin levels and elevated INR.", key_clues:"Progressive dyspnea + bilateral infiltrates + DLCO reduction = pulmonary toxicity. Unexplained INR rise on stable warfarin dose = CYP2C9 inhibition. Long-term amiodarone use ties both together.", why_missed:"Students may attribute the pulmonary findings to heart failure without considering drug toxicity. The INR change is a separate clue pointing to the same drug.", trap:"Amiodarone's half-life is 40–55 days — pulmonary toxicity and drug interactions can persist for months AFTER the drug is stopped. Also monitor thyroid function (TSH) regularly." },
  { number:2, cluster:"WPW + Afib — Drug Contraindication", objectives_tested:["Interpret how mechanisms of arrhythmias are linked to various classes of antiarrhythmic drugs","Discuss pharmacologic management of arrhythmias"], vignette:"A 28-year-old woman presents to the ED with palpitations and lightheadedness. ECG shows an irregular wide complex tachycardia with ventricular rates up to 220 bpm. A delta wave was noted on her previous ECG when she was in sinus rhythm. The ED resident prepares to give intravenous verapamil for rate control.", question:"Why is verapamil contraindicated in this patient, and what is the appropriate treatment?", answer:"Verapamil is contraindicated because it blocks the AV node, forcing all atrial impulses to conduct through the accessory pathway, potentially causing ventricular fibrillation. Appropriate treatment is IV procainamide or synchronized cardioversion.", why_correct:"In WPW with Afib, the AV node normally limits how many impulses reach the ventricles. Verapamil removes this protection, allowing rapid conduction via the accessory pathway → VF. Procainamide slows accessory pathway conduction.", key_clues:"History of delta wave on prior ECG = WPW. Irregular wide complex tachycardia = Afib conducting through accessory pathway. Young patient with very rapid rate = WPW top of differential.", why_missed:"Students may reflexively reach for verapamil or adenosine for any SVT/rapid rate. The wide complex + irregular + young patient + history of delta wave must trigger WPW protocol.", trap:"AV nodal blockers in WPW + Afib = potentially fatal. The whole class is contraindicated: verapamil, diltiazem, adenosine, digoxin, and β-blockers." },
  { number:3, cluster:"Drug-Induced Lupus — Procainamide", objectives_tested:["Identify most common side effects, limitations and toxicities of antiarrhythmic drugs"], vignette:"A 55-year-old man with a history of ventricular tachycardia has been taking procainamide for 8 months. He now presents with bilateral joint pain, a facial rash, pleuritis, and fatigue. Laboratory tests show: ANA positive (1:640), anti-histone antibodies positive, anti-dsDNA antibodies negative, complement C3 and C4 normal.", question:"What is the diagnosis, what is the most important distinguishing laboratory finding from systemic lupus erythematosus, and what is the treatment?", answer:"Drug-induced lupus erythematosus (DILE) from procainamide. Key distinguishing feature: anti-histone antibodies positive, anti-dsDNA antibodies negative (opposite of SLE). Treatment: discontinue procainamide.", why_correct:"Procainamide is the most common cause of drug-induced lupus. DILE is characterized by anti-histone antibodies with negative anti-dsDNA. Complement levels are typically normal (unlike SLE). Symptoms resolve with drug discontinuation.", key_clues:"ANA+ + anti-histone(+) + anti-dsDNA(−) + normal complement + procainamide use = drug-induced lupus. This pattern is pathognomonic.", why_missed:"Students may diagnose SLE without checking anti-dsDNA. The anti-histone vs anti-dsDNA distinction is the key differentiator Step 1 tests repeatedly.", trap:"Other drugs causing DILE: hydralazine (most common overall), isoniazid, minocycline, methyldopa. All → anti-histone(+), anti-dsDNA(−)." },
];

const QUESTIONS = [
  { number:1, cluster:"Class IC — CAST Trial", objectives_tested:["Identify side effects, limitations and toxicities of antiarrhythmic drugs"], stem:"A 58-year-old man with a history of myocardial infarction 3 months ago is found to have frequent asymptomatic premature ventricular contractions (PVCs) on a Holter monitor. His cardiologist considers starting flecainide to suppress the PVCs. Which of the following best describes the expected outcome based on available evidence?", choices:{ A:"Flecainide will suppress PVCs and reduce mortality", B:"Flecainide will suppress PVCs but increase mortality", C:"Flecainide will have no effect on PVCs", D:"Flecainide will increase PVCs and reduce mortality", E:"Flecainide is safe post-MI if the ejection fraction is preserved" }, correct:"B", tested_concept:"CAST trial — Class IC proarrhythmia post-MI", why_correct:"The CAST trial showed that flecainide and encainide suppressed PVCs post-MI but significantly increased mortality due to proarrhythmic effects (fatal ventricular arrhythmias). Class IC drugs are contraindicated post-MI and in structural heart disease.", why_wrong:{ A:"CAST trial proved the opposite — suppressing PVCs does not improve and actually worsens mortality", C:"IC drugs are highly effective at suppressing PVCs — that was not the problem", D:"IC drugs suppress PVCs; the issue is increased mortality, not increased PVCs", E:"IC drugs are contraindicated in ALL structural heart disease regardless of EF" }, trap:"The intuitive assumption that 'suppressing PVCs = better outcome' is wrong. CAST proved treating asymptomatic PVCs with IC drugs post-MI is harmful." },
  { number:2, cluster:"Adenosine — Mechanism & Contraindications", objectives_tested:["Discuss pharmacologic management of arrhythmias; identify toxicities and limitations"], stem:"A 32-year-old woman presents to the ED with sudden-onset palpitations and a heart rate of 185 bpm. ECG shows a regular narrow complex tachycardia. She is hemodynamically stable. IV adenosine is administered and the tachycardia terminates. She reports taking theophylline for asthma. Which of the following best explains why a higher-than-usual dose of adenosine was required?", choices:{ A:"Theophylline activates adenosine receptors, requiring more adenosine to compete", B:"Theophylline inhibits adenosine receptors (A1), blocking adenosine's effect", C:"Theophylline accelerates adenosine metabolism by adenosine deaminase", D:"Theophylline increases AV nodal conduction, opposing adenosine", E:"Theophylline causes tachycardia that is adenosine-resistant" }, correct:"B", tested_concept:"Theophylline (methylxanthine) is an adenosine receptor antagonist", why_correct:"Theophylline and other methylxanthines (caffeine) are competitive antagonists at adenosine A1 receptors. Since adenosine works by activating A1 receptors on the AV node to cause hyperpolarization, theophylline blocks this effect and higher adenosine doses are needed.", why_wrong:{ A:"Theophylline blocks, not activates, adenosine receptors", C:"Theophylline does not accelerate adenosine metabolism", D:"The mechanism is receptor antagonism, not direct AV nodal effect", E:"SVT is not inherently adenosine-resistant; the drug interaction explains the dose requirement" }, trap:"Dipyridamole has the OPPOSITE effect — blocks adenosine breakdown → potentiates adenosine → use LOWER dose. Methylxanthines: block → need MORE. Dipyridamole: potentiate → need LESS." },
  { number:3, cluster:"Digoxin Toxicity", objectives_tested:["Identify most common side effects, limitations and toxicities of antiarrhythmic drugs"], stem:"A 75-year-old woman with atrial fibrillation and heart failure is on digoxin 0.25 mg daily and furosemide 40 mg daily. She presents with nausea, vomiting, and reports seeing a yellow-green tinge around objects. ECG shows paroxysmal atrial tachycardia with 2:1 AV block. Serum potassium is 2.9 mEq/L. Which of the following best explains why her potassium level predisposes her to toxicity?", choices:{ A:"Hypokalemia increases renal excretion of digoxin", B:"Hypokalemia increases the number of Na⁺/K⁺-ATPase pumps", C:"Potassium competes with digoxin for binding to Na⁺/K⁺-ATPase; low K⁺ increases digoxin binding", D:"Hypokalemia causes compensatory aldosterone release that inactivates digoxin", E:"Low potassium directly activates the Na⁺/K⁺-ATPase pump" }, correct:"C", tested_concept:"Hypokalemia increases digoxin binding to Na⁺/K⁺-ATPase", why_correct:"Potassium and digoxin compete for the same binding site on the extracellular face of Na⁺/K⁺-ATPase. When serum K⁺ is low, there is less competition, so more digoxin binds and inhibits the pump — even at therapeutic drug levels.", why_wrong:{ A:"Hypokalemia does not increase renal digoxin excretion", B:"Hypokalemia does not upregulate Na⁺/K⁺-ATPase pumps", D:"Aldosterone does not inactivate digoxin", E:"Low K⁺ does not activate the pump — it allows more digoxin inhibition" }, trap:"Classic scenario: patient on BOTH digoxin AND a loop diuretic (furosemide). The diuretic causes hypokalemia, which dramatically increases digoxin toxicity even at a 'therapeutic' dose. Always monitor K⁺ in digoxin patients." },
  { number:4, cluster:"Amiodarone Drug Interactions", objectives_tested:["Identify most common side effects, limitations and toxicities of antiarrhythmic drugs"], stem:"A 70-year-old man with heart failure and persistent atrial fibrillation is started on amiodarone for rhythm control. He is also on warfarin (INR stable at 2.5), digoxin 0.25 mg daily, and lisinopril. Two weeks later his INR is 4.9 and he reports palpitations. Which of the following changes to his regimen are most appropriate?", choices:{ A:"Increase warfarin dose; continue digoxin", B:"Discontinue warfarin; reduce digoxin dose", C:"Reduce warfarin dose; reduce digoxin dose", D:"Continue all medications; recheck INR in 4 weeks", E:"Reduce warfarin dose; increase digoxin dose" }, correct:"C", tested_concept:"Amiodarone inhibits CYP2C9 (↑ warfarin) and P-glycoprotein (↑ digoxin)", why_correct:"Amiodarone inhibits CYP2C9 → decreases warfarin metabolism → ↑ warfarin levels → ↑ INR. Amiodarone also inhibits P-glycoprotein → decreases digoxin elimination → ↑ digoxin levels → toxicity risk. Both doses must be reduced.", why_wrong:{ A:"Warfarin dose should be REDUCED, not increased; digoxin must also be reduced", B:"Warfarin should not be discontinued — anticoagulation is needed for Afib; reduce the dose instead", D:"These interactions require immediate dose adjustments, not watchful waiting", E:"Digoxin dose should be REDUCED, not increased" }, trap:"Amiodarone's interactions with warfarin and digoxin are immediate and predictable. Whenever amiodarone is started, warfarin dose should be empirically reduced by ~30–50% and digoxin level monitored." },
  { number:5, cluster:"Torsades de Pointes", objectives_tested:["Interpret how mechanisms of arrhythmias are linked to antiarrhythmic drug classes; identify toxicities"], stem:"A 62-year-old woman is admitted for new-onset atrial fibrillation and started on IV ibutilide for chemical cardioversion. Twenty minutes later, she develops a polymorphic ventricular tachycardia with a characteristic twisting of the QRS complexes around the isoelectric baseline. Her QTc interval had been 480 ms prior to administration. Which of the following is the most appropriate immediate treatment?", choices:{ A:"Administer IV amiodarone", B:"Administer IV magnesium sulfate", C:"Administer IV lidocaine", D:"Administer IV procainamide", E:"Perform synchronized cardioversion" }, correct:"B", tested_concept:"Torsades de pointes treatment — IV magnesium sulfate", why_correct:"Torsades de pointes (TdP) is a form of polymorphic VT associated with a prolonged QT interval. It is triggered by early afterdepolarizations (EADs). IV magnesium sulfate is the first-line treatment — it suppresses EADs by blocking Ca²⁺ entry, even in patients with normal serum magnesium levels.", why_wrong:{ A:"Amiodarone prolongs QT and can worsen TdP — contraindicated in TdP", C:"Lidocaine (IB) shortens APD and can be tried but is not first-line — magnesium is preferred", D:"Procainamide (IA) prolongs QT further — will worsen TdP", E:"Synchronized cardioversion is used for hemodynamically unstable VT, not the first step in stable TdP" }, trap:"All drugs that prolong QT (Class IA, III, some antibiotics, antipsychotics) can cause TdP. The treatment (IV Mg²⁺) is the same regardless of the offending drug. Amiodarone is the one Class III drug that causes LESS TdP despite prolonging QT." },
];

const DIAGRAMS = [
  { title:"Vaughan-Williams Classification Summary", type:"comparison", objectives:["Explain basis of Vaughan-Williams classification; identify drug subclasses"], content:`┌────────┬──────────────┬──────────────────────────────────────────┬──────────────────────────────┐\n│ Class  │ Mechanism    │ Drugs                                    │ ECG Effect                   │\n├────────┼──────────────┼──────────────────────────────────────────┼──────────────────────────────┤\n│ IA     │ Na⁺ block +  │ Procainamide, Disopyramide               │ ↑ QRS + ↑ QT                 │\n│        │ K⁺ block     │                                          │                              │\n├────────┼──────────────┼──────────────────────────────────────────┼──────────────────────────────┤\n│ IB     │ Na⁺ block    │ Lidocaine, Mexiletine                    │ Minimal changes              │\n│        │ (↓ APD)      │                                          │                              │\n├────────┼──────────────┼──────────────────────────────────────────┼──────────────────────────────┤\n│ IC     │ Na⁺ block    │ Flecainide, Propafenone                  │ ↑ QRS + ↑ PR (no QT change)  │\n│        │ (marked)     │                                          │                              │\n├────────┼──────────────┼──────────────────────────────────────────┼──────────────────────────────┤\n│ II     │ β-block      │ Esmolol, Metoprolol, Propranolol         │ ↑ PR, ↓ HR                   │\n├────────┼──────────────┼──────────────────────────────────────────┼──────────────────────────────┤\n│ III    │ K⁺ block     │ Amiodarone, Dronedarone, Ibutilide,      │ ↑ QT (torsades risk)         │\n│        │ (↑ APD)      │ Dofetilide, Sotalol                      │                              │\n├────────┼──────────────┼──────────────────────────────────────────┼──────────────────────────────┤\n│ IV     │ Ca²⁺ block   │ Verapamil, Diltiazem                    │ ↑ PR, ↓ HR                   │\n├────────┼──────────────┼──────────────────────────────────────────┼──────────────────────────────┤\n│ Other  │ Various      │ Digoxin, Adenosine, Atropine, Mg²⁺      │ Various                      │\n└────────┴──────────────┴──────────────────────────────────────────┴──────────────────────────────┘` },
  { title:"Amiodarone Multi-Organ Toxicity", type:"pathway", objectives:["Identify most common side effects, limitations and toxicities of amiodarone"], content:`AMIODARONE TOXICITY — ORGAN BY ORGAN\n\n  Pulmonary (MOST SERIOUS)\n    → Interstitial pneumonitis / pulmonary fibrosis\n    → Symptoms: progressive dyspnea, dry cough\n    → Diagnosis: ground-glass opacities on CT, ↓ DLCO\n    → Monitor: annual CXR + PFTs\n\n  Thyroid (BOTH DIRECTIONS — contains 37% iodine)\n    → Hypothyroidism (iodine load suppresses thyroid — Wolff-Chaikoff)\n    → Hyperthyroidism (iodine substrate + direct thyroid toxicity)\n    → Monitor: TSH every 6 months\n\n  Hepatic\n    → ↑ LFTs (transaminases)\n    → Monitor: LFTs periodically\n\n  Corneal Microdeposits\n    → Almost universal; usually asymptomatic\n    → Visible on slit-lamp exam; reversible on stopping drug\n\n  Skin (sun-exposed areas)\n    → Blue-gray discoloration (pathognomonic)\n    → Photosensitivity — use sunscreen\n\n  Neurologic\n    → Peripheral neuropathy, tremor, ataxia\n\n  DRUG INTERACTIONS (critical):\n    → CYP2C9 inhibition → ↑ warfarin → ↑ INR (reduce warfarin ~30–50%)\n    → P-gp inhibition → ↑ digoxin levels (reduce digoxin dose)\n    → Half-life: 40–55 days → interactions/toxicity persist after stopping` },
  { title:"WPW + Afib — Safe vs. Dangerous Drugs", type:"flowchart", objectives:["Interpret how mechanisms of arrhythmias are linked to antiarrhythmic drug classes"], content:`WPW + ATRIAL FIBRILLATION\n  ECG: Irregular WIDE complex tachycardia + very rapid rate (often >200 bpm)\n\nNORMAL SITUATION:\n  Afib impulses → AV node filters rate → ventricles protected\n                → accessory pathway also conducts (contributes to wide QRS)\n\nDANGEROUS — AV NODAL BLOCKERS:\n  Adenosine / Verapamil / Diltiazem / Digoxin / β-blockers\n       ↓\n  Block AV node → ALL impulses forced through accessory pathway\n       ↓\n  Accessory pathway has NO decremental conduction\n       ↓\n  Rapid 1:1 conduction → Ventricular rates 300+ bpm → VENTRICULAR FIBRILLATION\n\nCORRECT TREATMENT:\n  Hemodynamically UNSTABLE → Synchronized cardioversion (FIRST)\n  Hemodynamically STABLE   → IV Procainamide (slows accessory pathway)\n                           → IV Ibutilide (alternative)\n\nMEMORY: "If WPW + AFib → Don't block the node → you'll open the floodgates"` },
  { title:"Arrhythmia Mechanism → Drug Target", type:"pathway", objectives:["Interpret how mechanisms of arrhythmias are linked to antiarrhythmic drug classes; discuss pharmacologic management"], content:`ARRHYTHMIA MECHANISM → DRUG CLASS → MECHANISM OF TERMINATION\n\n1. ENHANCED AUTOMATICITY (abnormal phase 4 depolarization)\n   → ↓ slope of phase 4 → Class II (β-block ↓ cAMP) or Class IV (Ca²⁺ block)\n   → Examples: sinus tachycardia, junctional tachycardia\n\n2. RE-ENTRY (most common mechanism)\n   Requires: slow conduction + unidirectional block + excitable tissue\n   → Class I (Na⁺ block): slow conduction further → convert to bidirectional block\n   → Class III (K⁺ block): ↑ ERP → tissue refractory when impulse returns\n   → Examples: AVNRT, AVRT, atrial flutter, VT post-MI\n\n3. TRIGGERED ACTIVITY\n   (a) EADs (Early Afterdepolarizations) — from ↑ QT\n       → Cause: Class IA/III drugs, hypokalemia, hypomagnesemia\n       → Arrhythmia: Torsades de pointes\n       → Treatment: IV Mg²⁺, ↑ HR (pacing/isoproterenol), correct electrolytes\n\n   (b) DADs (Delayed Afterdepolarizations) — from ↑ intracellular Ca²⁺\n       → Cause: Digoxin toxicity, catecholamine excess\n       → Treatment: β-blockers, Ca²⁺ channel blockers, digoxin Fab fragments` },
];

function QuestionsTab() {
  const [sel, setSel] = useState({});
  const [shown, setShown] = useState({});
  return QUESTIONS.map((q,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Q${q.number}`} color="amber"/><Pill text={q.cluster} color="amber"/>
      </div>
      <p style={{ fontSize:14, lineHeight:1.7, margin:"10px 0" }}>{q.stem}</p>
      {Object.entries(q.choices).map(([letter,txt]) => {
        const picked=sel[i]===letter, revealed=shown[i], isCorrect=letter===q.correct;
        let bg="var(--color-background-secondary)", border="0.5px solid var(--color-border-tertiary)";
        if(!revealed&&picked){bg=T.blue.bg;border=`0.5px solid ${T.blue.bdr}`;}
        if(revealed&&isCorrect){bg=T.green.bg;border=`0.5px solid ${T.green.bdr}`;}
        if(revealed&&picked&&!isCorrect){bg=T.red.bg;border=`0.5px solid ${T.red.bdr}`;}
        return <div key={letter} onClick={()=>!revealed&&setSel(s=>({...s,[i]:letter}))} style={{ background:bg, border, borderRadius:8, padding:"8px 12px", marginBottom:4, cursor:revealed?"default":"pointer", display:"flex", gap:10 }}>
          <span style={{ fontWeight:500, fontSize:13, minWidth:16 }}>{letter}.</span>
          <span style={{ fontSize:13 }}>{txt}</span>
        </div>;
      })}
      <button disabled={!sel[i]||shown[i]} onClick={()=>setShown(s=>({...s,[i]:true}))} style={{ marginTop:6, padding:"6px 14px", borderRadius:6, fontSize:13, cursor:sel[i]&&!shown[i]?"pointer":"default", background:sel[i]&&!shown[i]?T.blue.bg:"var(--color-background-secondary)", color:sel[i]&&!shown[i]?T.blue.txt:"var(--color-text-tertiary)", border:`0.5px solid ${sel[i]&&!shown[i]?T.blue.bdr:"var(--color-border-tertiary)"}` }}>
        Submit answer
      </button>
      {shown[i] && (
        <div style={{ marginTop:8 }}>
          <div style={{ background:T.green.bg, borderRadius:8, padding:"8px 12px", marginBottom:6 }}>
            <Lbl t="Correct answer"/>
            <p style={{ fontSize:13, fontWeight:500, color:T.green.txt, margin:"0 0 2px" }}>{q.correct} — {q.tested_concept}</p>
            <p style={{ fontSize:13, color:T.green.txt, margin:0 }}>{q.why_correct}</p>
          </div>
          {Object.entries(q.why_wrong).map(([l,e]) => <p key={l} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px" }}><strong>{l}:</strong> {e}</p>)}
          <div style={{ background:T.coral.bg, borderRadius:8, padding:"8px 12px", marginTop:6 }}>
            <Lbl t="Main trap"/><p style={{ fontSize:13, color:T.coral.txt, margin:0 }}>{q.trap}</p>
          </div>
        </div>
      )}
    </Card>
  ));
}

        <Pill text={d.type} color="pink"/><span style={{ fontWeight:500, fontSize:15 }}>{d.title}</span>
      </div>
      {d.objectives.map((o,j) => <p key={j} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px", paddingLeft:8, borderLeft:"2px solid #ED93B1" }}>{o}</p>)}
      <pre style={{ background:"var(--color-background-secondary)", borderRadius:8, padding:"12px", marginTop:8, fontSize:12, color:"var(--color-text-primary)", whiteSpace:"pre-wrap", fontFamily:"monospace", lineHeight:1.7, overflowX:"auto" }}>{d.content}</pre>
    </Card>
  ));
}

const STUDY_RENDERERS = { angles:AnglesTab, mindmap:MindMapTab, studyguide:StudyGuideTab, vignettes:VignettesTab, questions:QuestionsTab, diagrams:DiagramsTab };

function App() {
  const [activeTab, setActiveTab] = useState("angles");
  const Comp = STUDY_RENDERERS[activeTab];
  return (
    <div style={{ padding:"0.5rem 0.75rem", maxWidth:860, margin:"0 auto" }}>
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
        <div>
          <p style={{ fontSize:15, fontWeight:500, margin:0 }}>⚡ Antiarrhythmic Drugs I &amp; II</p>
          <p style={{ fontSize:11, color:"var(--color-text-secondary)", margin:0 }}>Georgetown SOM · Cardio Exam 2</p>
        </div>
      </div>
      <div style={{ display:"flex", gap:4, overflowX:"auto", paddingBottom:6, marginBottom:12 }}>
        {STUDY_TABS.map(t => {
          const active=activeTab===t.id;
          return <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ flexShrink:0, padding:"5px 12px", borderRadius:8, border:active?`1px solid ${T.purple.bdr}`:"0.5px solid var(--color-border-tertiary)", background:active?T.purple.bg:"transparent", color:active?T.purple.txt:"var(--color-text-secondary)", fontSize:12, fontWeight:active?500:400, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:13 }}>{t.icon}</span>{t.label}
          </button>;
        })}
      </div>
      <Comp/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
