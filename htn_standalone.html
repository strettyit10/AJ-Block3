  { objectives:["LO15–LO18 — CCBs, β-blockers, α-blockers, central sympatholytics"], mechanism:"CCBs: L-type Ca²⁺ block. DHP → vascular. Non-DHP → cardiac + vascular. β-blockers: ↓ CO + ↓ renin. α₁-blockers: ↓ SVR. Central sympatholytics: ↓ central SNS outflow.", high_yield_facts:["DHP (amlodipine, nicardipine): peripheral edema, reflex tachycardia, flushing — NO AV nodal effect", "Non-DHP (verapamil): constipation, bradycardia, AV block, ↑ digoxin levels — AVOID with β-blocker", "β-blockers NOT first-line for uncomplicated HTN (ALLHAT); compelling indications: post-MI, HFrEF, angina, Afib", "Labetalol: IV α+β blocker — drug of choice for HTN emergency in pregnancy", "Methyldopa: central α₂ agonist — safe in pregnancy; causes positive Coombs test, sedation", "Clonidine: abrupt withdrawal → rebound hypertensive crisis — always taper", "Prazosin/doxazosin: first-dose orthostatic hypotension — start low at bedtime; dual use in BPH"], vignette_clues:["HTN + BPH → doxazosin or prazosin (α₁ blocker — dual benefit)", "HTN emergency in pregnancy → IV labetalol (first choice)", "Patient on clonidine stops taking it → rebound HTN crisis", "Male patient on doxazosin for HTN develops retrograde ejaculation → expected (α₁ blockade in bladder neck)"], trap:"Non-DHP CCBs + β-blockers = complete heart block risk. DHP CCBs have NO AV nodal effect. Clonidine must be tapered.", if_you_see:"HTN + Afib rate control → non-DHP CCB or β-blocker. HTN + BPH → α₁ blocker. HTN in pregnancy → labetalol, methyldopa, or nifedipine.", integration:["Pharm: autonomic pharmacology, Ca²⁺ channels","OB: safe antihypertensives in pregnancy","Cardiology: Afib management"] },

const VIGNETTES = [
  { number:1, cluster:"ACEi Angioedema vs. Cough", objectives_tested:["LO12, LO13 — ACEi mechanism; bradykinin-mediated adverse effects"], vignette:"A 55-year-old Black man with hypertension has been on lisinopril 10 mg/day for 3 years. He presents to the ED with rapidly progressive tongue and lip swelling that began 2 hours ago. He denies hives or itching. He has no prior allergic reactions. BP is 148/92 mmHg. He has no history of angioedema. He recently started no new medications.", question:"Which of the following best explains the mechanism of this patient's adverse reaction to lisinopril?", answer:"ACE inhibitors block the degradation of bradykinin → accumulation of bradykinin → vasodilation and increased vascular permeability → angioedema. This is NOT IgE-mediated (no urticaria/pruritus).", why_correct:"ACE normally degrades bradykinin. Lisinopril blocks ACE → bradykinin accumulates → activates B2 receptors → vasodilation + ↑ vascular permeability → angioedema, especially of face/tongue/larynx. Unlike anaphylaxis, there is no urticaria because it is not IgE-mediated.", key_clues:"Angioedema without urticaria/pruritus on ACEi = bradykinin-mediated. Black patients have higher risk of ACEi-induced angioedema. Potentially life-threatening (airway compromise).", why_missed:"Students may think it is an allergic (IgE-mediated) reaction. The absence of urticaria and pruritus distinguishes bradykinin-mediated angioedema from anaphylaxis.", trap:"After ACEi-induced angioedema, switch to ARB — ARBs do NOT affect bradykinin and have very low risk of angioedema. Do NOT rechallenge with any ACEi." },
  { number:2, cluster:"Compelling Indications: Diabetic Nephropathy", objectives_tested:["LO21: Compelling indications for specific antihypertensives"], vignette:"A 52-year-old woman with type 2 diabetes mellitus and hypertension has BP 148/92 mmHg on two visits. She has a urine albumin-to-creatinine ratio of 280 mg/g (normal <30). Her serum K+ is 4.2 mEq/L and creatinine is 1.1 mg/dL. Her physician considers which antihypertensive to start.", question:"Which of the following antihypertensive agents is most appropriate as first-line therapy for this patient and why?", answer:"ACE inhibitor (or ARB) — first-line in diabetic nephropathy because it reduces intraglomerular pressure by dilating the efferent arteriole → reduces proteinuria and slows CKD progression, independent of BP lowering.", why_correct:"In diabetic nephropathy, angiotensin II preferentially constricts efferent arterioles → ↑ intraglomerular pressure → glomerular damage and proteinuria. ACEi/ARBs block Ang II → dilate efferent arterioles → ↓ intraglomerular pressure → ↓ proteinuria → renoprotective effect beyond BP lowering.", key_clues:"DM + microalbuminuria/proteinuria → ACEi or ARB. Monitor K+ and creatinine after starting (acceptable Cr rise <30%).", why_missed:"Students may choose a thiazide (ALLHAT first-line) without recognizing the compelling indication — DM with proteinuria requires ACEi/ARB specifically for renoprotection.", trap:"Thiazide is first-line for uncomplicated HTN — but compelling indications override this general rule. ACEi/ARB is mandated by the diabetic nephropathy compelling indication." },
  { number:3, cluster:"Hypertensive Emergency in Pregnancy", objectives_tested:["LO23: HTN in pregnancy; LO24: IV drugs for hypertensive emergencies"], vignette:"A 28-year-old woman at 36 weeks gestation presents with BP 178/114 mmHg, severe headache, and visual changes. Labs show proteinuria 3+ on urinalysis. Fetal monitoring is reassuring. The diagnosis of severe preeclampsia is made and the decision is made to manage BP acutely with IV medications while preparing for delivery.", question:"Which of the following IV antihypertensive agents is most appropriate for acute BP management in this patient?", answer:"IV labetalol — the drug of choice for hypertensive emergency in pregnancy. It is an α+β blocker that reduces SVR and HR without compromising uteroplacental blood flow.", why_correct:"Labetalol (α₁+β blocker) reduces BP via both ↓ SVR (α₁ block) and ↓ CO (β block), providing smooth BP reduction without reflex tachycardia. It is safe in pregnancy and does not cause fetal/uteroplacental compromise at standard doses.", key_clues:"Severe preeclampsia + hypertensive emergency → IV labetalol (first-line) or IV hydralazine (alternative). AVOID nitroprusside (cyanide toxicity to fetus) and ACEi/ARBs (teratogenic).", why_missed:"Students may choose hydralazine (acceptable) or miss that nitroprusside and ACEi are absolutely contraindicated in pregnancy.", trap:"Nitroprusside releases cyanide → fetal cyanide toxicity. ACEi/ARBs: fetal renal agenesis, oligohydramnios, skull hypoplasia. Labetalol is the preferred IV agent in pregnancy HTN emergency." },
];

const QUESTIONS = [
  { number:1, cluster:"Thiazide Adverse Effects", objectives_tested:["LO8, LO9 — Thiazide diuretics: MOA and adverse effects"], stem:"A 62-year-old man with hypertension has been well-controlled on hydrochlorothiazide for 6 months. He now presents with acute right great toe pain and swelling. Uric acid level is 9.8 mg/dL (normal <7.0). Which of the following best explains this complication?", choices:{ A:"HCTZ blocks uric acid excretion by inhibiting URAT1 in the proximal tubule", B:"HCTZ increases uric acid production by activating xanthine oxidase", C:"HCTZ causes volume depletion → ↑ proximal tubule reabsorption of uric acid → hyperuricemia", D:"HCTZ directly deposits uric acid crystals in joints", E:"HCTZ inhibits the conversion of uric acid to allantoin" }, correct:"C", tested_concept:"Thiazide-induced hyperuricemia via volume depletion and increased uric acid reabsorption", why_correct:"Thiazides cause volume depletion → compensatory ↑ proximal tubule reabsorption of both Na and uric acid (uric acid follows Na) → hyperuricemia → gout in susceptible patients.", why_wrong:{ A:"HCTZ does not directly block URAT1; the mechanism is indirect via volume contraction", B:"HCTZ does not activate xanthine oxidase", D:"HCTZ does not directly deposit crystals", E:"Allantoin is not a human metabolic pathway (humans lack uricase)" }, trap:"The mechanism of thiazide-induced hyperuricemia is indirect — volume contraction → ↑ proximal tubule Na reabsorption → uric acid follows → hyperuricemia." },
  { number:2, cluster:"ACEi vs. ARB", objectives_tested:["LO12, LO13 — ACEi vs ARBs: distinguishing pharmacological effects"], stem:"A 48-year-old woman with hypertension and type 2 diabetes mellitus is started on lisinopril. Four weeks later she develops a persistent dry cough that is interfering with sleep. Her BP is now 132/84 mmHg and her urine albumin-to-creatinine ratio has improved. Which of the following is the most appropriate next step?", choices:{ A:"Switch to propranolol to control BP while maintaining renal protection", B:"Add a cough suppressant (dextromethorphan) and continue lisinopril", C:"Switch to losartan, which provides equivalent renoprotection without the bradykinin-mediated cough", D:"Switch to amlodipine, which also has renoprotective effects in diabetic nephropathy", E:"Discontinue antihypertensive therapy and monitor BP" }, correct:"C", tested_concept:"ACEi dry cough → switch to ARB for equivalent renoprotection without bradykinin effect", why_correct:"ACEi-induced cough is caused by bradykinin accumulation. ARBs block the AT1 receptor without affecting bradykinin → no cough. ARBs provide equivalent renoprotection in diabetic nephropathy.", why_wrong:{ A:"Propranolol does not have specific renoprotective effects in diabetic nephropathy", B:"The cough is bradykinin-mediated and will persist regardless of cough suppressants", D:"Amlodipine does not have the same efferent arteriole dilation mechanism that confers renoprotection", E:"The patient has a compelling indication (DM+proteinuria) — therapy must be continued" }, trap:"Cough suppressants will NOT help ACEi-induced cough. Only switching drug class resolves it." },
  { number:3, cluster:"β-Blocker Subtype", objectives_tested:["LO17, LO18 — β-blocker subtypes and clinical uses"], stem:"A 58-year-old man with hypertension, a 15-pack-year smoking history, and mild COPD presents for medication management. He also has benign prostatic hyperplasia. Which of the following antihypertensive regimens is most appropriate?", choices:{ A:"Propranolol for BP control and prazosin for BPH", B:"Metoprolol and doxazosin", C:"Labetalol monotherapy", D:"Verapamil for BP control and tamsulosin for BPH", E:"Amlodipine and doxazosin" }, correct:"E", tested_concept:"COPD → avoid β-blockers; BPH + HTN → α₁ blocker. Safe combo: DHP CCB + α₁ blocker", why_correct:"COPD is a relative contraindication to β-blockers (β₂ → bronchoconstriction). Amlodipine safely lowers BP. Doxazosin (α₁ blocker) treats both HTN and BPH.", why_wrong:{ A:"Propranolol is non-selective β-blocker — contraindicated in COPD", B:"Metoprolol is β₁-selective but still risky in COPD", C:"Labetalol has β₂ blocking activity — risky in COPD", D:"Verapamil acceptable, but tamsulosin (α₁A selective) primarily targets prostate with less systemic BP effect" }, trap:"Cardioselective β-blockers (metoprolol) are RELATIVELY safer in COPD but still pose risk — when COPD is a factor, prefer non-β-blocker antihypertensives." },
  { number:4, cluster:"Direct Vasodilator Compensation", objectives_tested:["LO19, LO20 — Direct vasodilators and compensatory mechanisms"], stem:"A 45-year-old man with severe resistant hypertension is started on hydralazine monotherapy. Despite an initial modest reduction in blood pressure, his BP returns toward baseline within 2 weeks. He also develops palpitations and peripheral edema. Which of the following best explains why hydralazine monotherapy is insufficient?", choices:{ A:"Hydralazine is metabolized too rapidly in fast acetylators, reducing its duration of action", B:"Hydralazine causes downregulation of its own receptors over time", C:"Arteriolar dilation triggers baroreceptor-mediated SNS activation and RAAS activation, causing reflex tachycardia and sodium retention that counteract the BP reduction", D:"Hydralazine blocks renal prostaglandin synthesis, causing Na retention", E:"Hydralazine causes upregulation of angiotensin II receptors" }, correct:"C", tested_concept:"Vasodilator compensatory mechanisms: reflex SNS activation (tachycardia) + RAAS activation (Na/water retention)", why_correct:"Direct arteriolar vasodilation → ↓ BP → baroreceptor activation → reflex SNS ↑ (↑ HR, ↑ renin) + RAAS activation (↑ aldosterone → Na/water retention). Solution: triple therapy = hydralazine + β-blocker + diuretic.", why_wrong:{ A:"Fast acetylator status affects hydralazine metabolism but is not the primary reason for BP escape", B:"Hydralazine does not cause receptor downregulation as a primary mechanism", D:"Not the primary mechanism of fluid retention with hydralazine", E:"Ang II receptor upregulation is not a known primary mechanism" }, trap:"Vasodilator monotherapy almost always fails due to compensatory mechanisms. β-blocker + diuretic must accompany vasodilators." },
  { number:5, cluster:"Hypertensive Emergency Drugs", objectives_tested:["LO24 — IV drugs for hypertensive emergencies"], stem:"A 40-year-old man presents to the ICU with BP 230/140 mmHg, altered mental status, and papilledema. He has no prior cardiac or renal history. After confirming hypertensive encephalopathy, the team decides to lower BP by approximately 25% over the first hour using an IV agent. Which of the following is the most appropriate IV antihypertensive?", choices:{ A:"Oral amlodipine crushed and given via NG tube", B:"IV nitroprusside at low dose for 72 hours", C:"IV nicardipine, titrated to achieve controlled BP reduction", D:"IV furosemide as the primary intervention", E:"IV hydralazine bolus repeated every 30 minutes" }, correct:"C", tested_concept:"IV nicardipine: titratable DHP CCB for hypertensive emergency including encephalopathy", why_correct:"IV nicardipine (DHP CCB) provides smooth, titratable BP reduction, ideal for hypertensive encephalopathy where a controlled ~25% reduction over the first hour is needed.", why_wrong:{ A:"Oral agents are inappropriate in hypertensive emergencies requiring IV titration", B:"IV nitroprusside risks cyanide toxicity with prolonged use and requires intensive monitoring", D:"Furosemide treats volume overload but is not the primary treatment for hypertensive encephalopathy", E:"IV hydralazine bolus causes erratic BP changes and is not preferred for encephalopathy" }, trap:"The goal in hypertensive encephalopathy is controlled BP reduction (not maximal and not too fast). Nicardipine's titratability makes it superior." },
];

const DIAGRAMS = [
  { title:"Antihypertensive Drug Classification and Sites of Action", type:"pathway", objectives:["LO5, LO6 — BP control mechanisms and drug targets"], content:`BP = Cardiac Output (CO) × Systemic Vascular Resistance (SVR)\n\nREDUCE CO:                          REDUCE SVR:\n  β-Blockers (↓ HR, ↓ contractility)   CCBs — DHP (amlodipine, nicardipine)\n  Diuretics (↓ plasma volume)          ACEi / ARBs (↓ Ang II)\n  Central sympatholytics (↓ SNS)       α₁-Blockers (prazosin, doxazosin)\n                                        Direct vasodilators (hydralazine, minoxidil)\n\nNEPHRON SITES OF DIURETIC ACTION:\n  Proximal tubule     → Acetazolamide (carbonic anhydrase inhibitor)\n  Loop of Henle       → Loop diuretics: furosemide, torsemide (NKCC2)\n  Distal convoluted   → Thiazides: HCTZ, chlorthalidone, metolazone (NCC)\n  Collecting duct     → K+-sparing: triamterene (ENaC), spironolactone/eplerenone (MRA)` },

  { title:"β-Blocker Subtypes: Key Distinctions", type:"comparison", objectives:["LO17, LO18 — β-blocker subtypes and clinical uses"], content:`DRUG          RECEPTOR PROFILE           KEY FEATURES\n──────────────────────────────────────────────────────────────────────────────\nPropranolol   β₁ + β₂ (nonselective)    AVOID in asthma/COPD. Masks hypoglycemia.\n                                          Uses: migraine ppx, essential tremor,\n                                          portal HTN, thyrotoxicosis, anxiety\nMetoprolol    β₁-selective               Safer in asthma. Approved for HFrEF.\nBisoprolol    β₁-selective               Approved for HFrEF. High selectivity.\nLabetalol     α₁ + β₁ + β₂              IV: drug of choice for HTN emergency\n                                          in pregnancy. ↓ SVR + ↓ CO.\nCarvedilol    α₁ + β₁ + β₂              Approved for HFrEF. Post-MI use.\nNebivolol     β₁ + stimulates NO         Least metabolic side effects. Vasodilation.` },
  { title:"HTN in Pregnancy and Hypertensive Emergencies", type:"comparison", objectives:["LO23, LO24 — Pregnancy HTN; IV drugs for emergencies"], content:`HTN IN PREGNANCY — SAFE DRUGS:\n  Oral: Methyldopa (central α₂ agonist), Labetalol, Nifedipine (DHP CCB)\n  IV:   Labetalol (FIRST-LINE for HTN emergency in pregnancy)\n        Hydralazine (second-line IV in obstetric emergency)\n\nHTN IN PREGNANCY — ABSOLUTELY AVOID:\n  ACEi / ARBs → fetal renal agenesis, oligohydramnios, skull hypoplasia\n  Nitroprusside → cyanide toxicity to fetus\n  Atenolol → fetal growth restriction\n\nHYPERTENSIVE EMERGENCY IV DRUGS:\n  Drug            MOA                         Best Use\n  ─────────────────────────────────────────────────────────────\n  Nicardipine IV  DHP CCB → ↓ SVR            Titratable; neurological HTN emergency\n  Labetalol IV    α₁+β blocker → ↓ HR+SVR   Pregnancy emergency; aortic dissection\n  Nitroprusside   NO donor → ↓ pre+afterload  ICU only; AVOID in pregnancy\n                                               Cyanide toxicity risk (prolonged use)` },

function AnglesTab() {
  return ANGLES.map((c,i) => (
    <Card key={i}>
      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Cluster ${c.number}`} color="purple"/>
        <span style={{ fontWeight:500, fontSize:15 }}>{c.theme}</span>
      </div>
      {c.objectives.map((o,j) => <p key={j} style={{ margin:"0 0 2px", fontSize:13, color:"var(--color-text-secondary)", paddingLeft:10, borderLeft:"2px solid #AFA9EC" }}>{o}</p>)}
      <Lbl t="Core mechanism"/><p style={{ fontSize:13, margin:"0 0 4px" }}>{c.mechanism}</p>
      <p style={{ fontSize:12, color:"var(--color-text-secondary)", fontStyle:"italic", margin:"0 0 10px" }}>{c.why_testable}</p>
      {c.angles.map((a,j) => (
        <Inset key={j}>
          <p style={{ fontWeight:500, fontSize:14, margin:"0 0 6px" }}>Angle {j+1}: {a.title}</p>
          {[["Tested concept",a.tested_concept],["Vignette pattern",a.vignette_pattern],["Key clues",a.key_clues],["Common trap",a.trap],["Disciplines",a.disciplines]].map(([l,v]) =>
            v ? <div key={l}><Lbl t={l}/><p style={{ fontSize:13, margin:"0 0 4px" }}>{v}</p></div> : null
          )}
        </Inset>
      ))}
    </Card>
  ));
}

function MindMapTab() {
  return MINDMAP.map((c,i) => (
    <Card key={i}>
      <div style={{ display:"flex", alignItems:"center", gap:8, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Cluster ${c.number}`} color="teal"/>
        <span style={{ fontWeight:500, fontSize:15 }}>{c.theme}</span>
      </div>
      <p style={{ fontSize:13, color:"var(--color-text-secondary)", margin:"0 0 8px", paddingLeft:10, borderLeft:"2px solid #5DCAA5", fontStyle:"italic" }}>{c.mechanism}</p>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(140px,1fr))", gap:8, marginBottom:8 }}>
        {Object.entries(c.nodes).filter(([,v])=>v).map(([k,v]) => (
          <div key={k} style={{ background:"var(--color-background-secondary)", borderRadius:8, padding:"8px 10px" }}>
            <Lbl t={k}/><p style={{ fontSize:12, margin:0 }}>{v}</p>
          </div>
        ))}
      </div>
      <Lbl t="Links to"/>{c.links.map((l,j) => <Pill key={j} text={l} color="teal"/>)}

}

      <button onClick={()=>setOpen(o=>({...o,[i]:!o[i]}))} style={{ marginTop:10, fontSize:13, padding:"6px 14px", cursor:"pointer", borderRadius:6, background:"transparent", border:"0.5px solid var(--color-border-secondary)", color:"var(--color-text-primary)" }}>

      {open[i] && (
        <div style={{ marginTop:8 }}>
          <div style={{ background:T.green.bg, borderRadius:8, padding:"8px 12px", marginBottom:8 }}>
            <Lbl t="Correct answer"/><p style={{ fontSize:13, fontWeight:500, color:T.green.txt, margin:0 }}>{v.answer}</p>
          </div>
          {[["Why correct",v.why_correct],["Key clues",v.key_clues],["Why a student might miss it",v.why_missed],["Exam writer trap",v.trap]].map(([l,val]) =>
            val ? <div key={l}><Lbl t={l}/><p style={{ fontSize:13, margin:"0 0 6px" }}>{val}</p></div> : null
          )}
        </div>
      )}
    </Card>
  ));
}

function QuestionsTab() {
  const [sel, setSel] = useState({});
  const [shown, setShown] = useState({});
  return QUESTIONS.map((q,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", marginBottom:6 }}>
        <Pill text={`Q${q.number}`} color="amber"/><Pill text={q.cluster} color="amber"/>
      </div>
      <p style={{ fontSize:14, lineHeight:1.7, margin:"10px 0" }}>{q.stem}</p>
      {Object.entries(q.choices).map(([letter,txt]) => {
        const picked=sel[i]===letter, revealed=shown[i], isCorrect=letter===q.correct;
        let bg="var(--color-background-secondary)", border="0.5px solid var(--color-border-tertiary)";
        if(!revealed&&picked){bg=T.blue.bg;border=`0.5px solid ${T.blue.bdr}`;}
        if(revealed&&isCorrect){bg=T.green.bg;border=`0.5px solid ${T.green.bdr}`;}
        if(revealed&&picked&&!isCorrect){bg=T.red.bg;border=`0.5px solid ${T.red.bdr}`;}
        return <div key={letter} onClick={()=>!revealed&&setSel(s=>({...s,[i]:letter}))} style={{ background:bg, border, borderRadius:8, padding:"8px 12px", marginBottom:4, cursor:revealed?"default":"pointer", display:"flex", gap:10 }}>
          <span style={{ fontWeight:500, fontSize:13, minWidth:16 }}>{letter}.</span>
          <span style={{ fontSize:13 }}>{txt}</span>
        </div>;
      })}
      <button disabled={!sel[i]||shown[i]} onClick={()=>setShown(s=>({...s,[i]:true}))} style={{ marginTop:6, padding:"6px 14px", borderRadius:6, fontSize:13, cursor:sel[i]&&!shown[i]?"pointer":"default", background:sel[i]&&!shown[i]?T.blue.bg:"var(--color-background-secondary)", color:sel[i]&&!shown[i]?T.blue.txt:"var(--color-text-tertiary)", border:`0.5px solid ${sel[i]&&!shown[i]?T.blue.bdr:"var(--color-border-tertiary)"}` }}>
        Submit answer
      </button>
      {shown[i] && (
        <div style={{ marginTop:8 }}>
          <div style={{ background:T.green.bg, borderRadius:8, padding:"8px 12px", marginBottom:6 }}>
            <Lbl t="Correct answer"/>
            <p style={{ fontSize:13, fontWeight:500, color:T.green.txt, margin:"0 0 2px" }}>{q.correct} — {q.tested_concept}</p>
            <p style={{ fontSize:13, color:T.green.txt, margin:0 }}>{q.why_correct}</p>
          </div>
          {Object.entries(q.why_wrong).map(([l,e]) => <p key={l} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px" }}><strong>{l}:</strong> {e}</p>)}
          <div style={{ background:T.coral.bg, borderRadius:8, padding:"8px 12px", marginTop:6 }}>
            <Lbl t="Main trap"/><p style={{ fontSize:13, color:T.coral.txt, margin:0 }}>{q.trap}</p>
          </div>
        </div>
      )}
    </Card>
  ));
}

function DiagramsTab() {
  return DIAGRAMS.map((d,i) => (
    <Card key={i}>
      <div style={{ display:"flex", gap:6, flexWrap:"wrap", alignItems:"center", marginBottom:6 }}>
        <Pill text={d.type} color="pink"/><span style={{ fontWeight:500, fontSize:15 }}>{d.title}</span>
      </div>
      {d.objectives.map((o,j) => <p key={j} style={{ fontSize:12, color:"var(--color-text-secondary)", margin:"0 0 2px", paddingLeft:8, borderLeft:"2px solid #ED93B1" }}>{o}</p>)}
      <pre style={{ background:"var(--color-background-secondary)", borderRadius:8, padding:"12px", marginTop:8, fontSize:12, color:"var(--color-text-primary)", whiteSpace:"pre-wrap", fontFamily:"monospace", lineHeight:1.7, overflowX:"auto" }}>{d.content}</pre>
    </Card>
  ));
}

const STUDY_RENDERERS = { angles:AnglesTab, mindmap:MindMapTab, studyguide:StudyGuideTab, vignettes:VignettesTab, questions:QuestionsTab, diagrams:DiagramsTab };

function App() {
  const [activeTab, setActiveTab] = useState("angles");
  const Comp = STUDY_RENDERERS[activeTab];
  return (
    <div style={{ padding:"0.5rem 0.75rem", maxWidth:860, margin:"0 auto" }}>
      <div style={{ marginBottom:10 }}>
        <p style={{ fontSize:15, fontWeight:500, margin:0 }}>🩺 Treatment of Hypertension</p>
        <p style={{ fontSize:11, color:"var(--color-text-secondary)", margin:0 }}>Georgetown SOM · Dr. Hernandez · Cardio Exam 2</p>
      </div>
      <div style={{ display:"flex", gap:4, overflowX:"auto", paddingBottom:6, marginBottom:12 }}>
        {STUDY_TABS.map(t => {
          const active=activeTab===t.id;
          return <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{ flexShrink:0, padding:"5px 12px", borderRadius:8, border:active?`1px solid ${T.purple.bdr}`:"0.5px solid var(--color-border-tertiary)", background:active?T.purple.bg:"transparent", color:active?T.purple.txt:"var(--color-text-secondary)", fontSize:12, fontWeight:active?500:400, cursor:"pointer", display:"flex", alignItems:"center", gap:5 }}>
            <span style={{ fontSize:13 }}>{t.icon}</span>{t.label}
          </button>;
        })}
      </div>
      <Comp/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
