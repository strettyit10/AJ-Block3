<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fill-in-the-Blank Tables</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#111318;--surface:#191c23;--surface2:#20242e;
  --border:#282d3a;--text:#dde3f0;--muted:#5a6380;
  --green:#2ecc71;--red:#e74c3c;--blue:#3498db;--amber:#f39c12;--purple:#9b59b6;
  --blank-bg:#0d1117;--blank-border:#3d4460;--blank-fill:#1a2035;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}

header{padding:22px 32px 18px;border-bottom:1px solid var(--border)}
.hdr-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:700;color:var(--blue)}
.logo span{color:var(--muted);font-weight:400;font-size:14px;margin-left:8px}

.tab-bar{display:flex;padding:0 32px;border-bottom:1px solid var(--border);gap:4px;overflow-x:auto}
.tab{padding:12px 18px;font-size:13px;font-weight:500;color:var(--muted);background:none;
  border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;
  font-family:'IBM Plex Sans',sans-serif;transition:.15s}
.tab.on{color:var(--blue);border-bottom-color:var(--blue)}
.tab:hover:not(.on){color:var(--text)}

.content{padding:28px 32px;max-width:1000px;margin:0 auto}
.section-title{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;
  letter-spacing:.06em;color:var(--muted);margin-bottom:20px;text-transform:uppercase}

/* SCORE BAR */
.score-bar{display:flex;align-items:center;gap:16px;margin-bottom:24px;padding:12px 18px;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;flex-wrap:wrap}
.score-bar .lbl{font-size:13px;color:var(--muted)}
.score-bar .num{font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700}
.btn-check{padding:8px 20px;background:var(--blue);color:white;border:none;border-radius:6px;
  font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
.btn-check:hover{background:#2488cc}
.btn-reset{padding:8px 20px;background:transparent;color:var(--muted);border:1px solid var(--border);
  border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:13px;cursor:pointer;transition:.15s}
.btn-reset:hover{border-color:var(--blue);color:var(--blue)}

/* TABLE */
.fill-table{width:100%;border-collapse:collapse;margin-bottom:28px;font-size:14px}
.fill-table th{background:var(--surface2);padding:10px 14px;text-align:left;
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:.06em;color:var(--muted);border-bottom:2px solid var(--border)}
.fill-table td{padding:9px 14px;border-bottom:1px solid var(--border);vertical-align:middle}
.fill-table tr:last-child td{border-bottom:none}
.fill-table tr:hover td{background:rgba(52,152,219,.04)}

.highlight-row td{background:rgba(231,76,60,.06)!important}
.highlight-row td:first-child{border-left:3px solid var(--red)}

/* BLANKS */
.blank{display:inline-block;position:relative}
.blank input{
  background:var(--blank-bg);border:1px solid var(--blank-border);
  border-radius:4px;color:var(--text);font-family:'IBM Plex Mono',monospace;
  font-size:13px;padding:5px 10px;width:100%;transition:.15s;outline:none}
.blank input:focus{border-color:var(--blue);background:var(--blank-fill)}
.blank input.correct{border-color:var(--green)!important;background:rgba(46,204,113,.1)!important;color:var(--green)}
.blank input.wrong{border-color:var(--red)!important;background:rgba(231,76,60,.1)!important;color:var(--red)}
.blank input.revealed{border-color:var(--amber)!important;background:rgba(243,156,18,.1)!important;color:var(--amber)}

/* FIXED CELL */
.cell-fixed{color:var(--text);font-weight:500}
.cell-key{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700}

/* TAG */
.tag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600;
  letter-spacing:.04em;font-family:'IBM Plex Mono',monospace}
.tag-r{background:rgba(231,76,60,.15);color:#ff6b6b}
.tag-g{background:rgba(46,204,113,.15);color:#2ecc71}
.tag-b{background:rgba(52,152,219,.15);color:#3498db}
.tag-a{background:rgba(243,156,18,.15);color:#f39c12}
.tag-p{background:rgba(155,89,182,.15);color:#9b59b6}

.instruction{background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:14px 18px;margin-bottom:20px;font-size:13px;color:var(--muted);line-height:1.6}
.instruction strong{color:var(--text)}

@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.content>*{animation:fade .2s ease}
</style>
</head>
<body>

<header>
  <div class="hdr-top">
    <div><div class="logo">fill_in_blanks<span>// cardio path</span></div></div>
  </div>
</header>

<div class="tab-bar">
  <button class="tab on" onclick="setTab('mi',this)">MI Timeline</button>
  <button class="tab" onclick="setTab('organisms',this)">IE Organisms</button>
  <button class="tab" onclick="setTab('cm',this)">Cardiomyopathies</button>
  <button class="tab" onclick="setTab('chd',this)">Congenital HD</button>
  <button class="tab" onclick="setTab('valves',this)">Valve Lesions</button>
</div>

<div class="content" id="content"></div>

<script>
// ANSWERS stored separately so they're never in DOM before checking
const TABLES = {

  title: "MI Histology, Gross Pathology & Complications",
  instructions: "Fill in the blank cells. The 3–7 day window is the most tested section.",
  cols: ["Timing","Histology (dominant finding)","Gross Appearance","Key Complication / Clinical"],
  highlight: [3,4], // 0-indexed rows to highlight (most tested)
  rows: [
    ["0–4 hours", {blank:"Early coagulative necrosis; wavy fibers",w:220}, {blank:"No gross change (normal)",w:200}, {blank:"Troponin starts rising ~3–4h",w:240}],
    ["4–24 hours", {blank:"Coagulative necrosis; neutrophils begin",w:220}, {blank:"Dark mottling begins",w:200}, {blank:"V-fib risk (EARLY = ELECTRICAL)",w:240}],
    ["1–3 days", {blank:"NEUTROPHILS (peak infiltration)",w:220}, {blank:"Mottling + yellow-tan center forming",w:200}, {blank:"Fibrinous pericarditis possible",w:240}],
    ["3–7 days ★", {blank:"MACROPHAGES (peak infiltration)",w:220}, {blank:"Soft yellow-tan center + bright red border",w:200}, {blank:"MAX rupture risk: free wall / papillary / septal",w:240}],
    ["7–14 days", {blank:"Granulation tissue + neovascularization",w:220}, {blank:"Red-gray depressed infarct borders",w:200}, {blank:"Healing phase; Dressler syndrome possible",w:240}],
    ["2+ weeks", {blank:"Dense collagenous scar (fibrosis)",w:220}, {blank:"Gray-white firm scar",w:200}, {blank:"Ventricular aneurysm risk; mural thrombus",w:240}],
  ],
  extras: {
    title: "Post-MI Complications",
    ecols: ["Complication","Timing","Key Clue"],
    erows: [
      [{blank:"Arrhythmia (V-fib)",w:200}, {blank:"<24 hours",w:120}, "Most common early cause of death"],
      [{blank:"Free wall rupture",w:200}, {blank:"3–7 days",w:120}, "Cardiac tamponade → sudden death"],
      [{blank:"Papillary muscle rupture",w:200}, {blank:"3–7 days",w:120}, "Acute MR → murmur apex → axilla"],
      [{blank:"Septal rupture (VSD)",w:200}, {blank:"3–7 days",w:120}, "New holosystolic murmur at LLSB"],
      [{blank:"Dressler syndrome",w:200}, {blank:"2–10 weeks",w:120}, "Autoimmune pericarditis; anti-heart antibodies"],
      [{blank:"Ventricular aneurysm",w:200}, {blank:"Weeks–months",w:120}, "Persistent ST elevation; mural thrombus"],
    ]
  }
},

organisms: {
  title: "Infective Endocarditis — Organism–Valve–Source Map",
  instructions: "Fill in the organisms, valve targets, and source/context for each IE scenario.",
  cols: ["Organism","Valve / Location","Source / Context","IE Type"],
  rows: [
    [{blank:"Staph aureus (S. aureus)",w:220}, {blank:"Tricuspid (IVDU) or any normal valve",w:220}, {blank:"IV drug use / skin",w:180}, {blank:"Acute IE",w:130}],
    [{blank:"Strep viridans (S. viridans)",w:220}, {blank:"Mitral or Aortic (damaged valves)",w:220}, {blank:"Dental procedure",w:180}, {blank:"Subacute IE",w:130}],
    [{blank:"S. bovis (S. gallolyticus)",w:220}, {blank:"Any valve",w:220}, {blank:"Colorectal cancer (GI source)",w:180}, {blank:"Subacute IE",w:130}],
    [{blank:"Staph epidermidis (S. epidermidis)",w:220}, {blank:"Prosthetic valve",w:220}, {blank:"Skin flora — post-surgery",w:180}, {blank:"Early prosthetic IE",w:130}],
    [{blank:"Enterococcus faecalis",w:220}, {blank:"Any valve",w:220}, {blank:"GU or GI procedure",w:180}, {blank:"Variable",w:130}],
  ],
  extras: {
    title: "Sterile Endocarditis — Vegetation Comparison",
    ecols: ["Condition","Vegetation Type","Location on Valve","Etiology"],
    erows: [
      [{blank:"NBTE (Marantic)",w:180}, {blank:"Small, sterile, loosely adherent",w:220}, {blank:"Lines of closure (one side)",w:200}, {blank:"Malignancy / DIC / hypercoagulable",w:200}],
      [{blank:"Libman-Sacks",w:180}, {blank:"Flat, small, reddish",w:220}, {blank:"BOTH SIDES of valve (unique!)",w:200}, {blank:"SLE — immune complex deposition",w:200}],
    ]
  }
},

cm: {
  title: "Cardiomyopathy Comparison",
  instructions: "Fill in the blanks for each cardiomyopathy type. EF, mechanism, and classic clue are most tested.",
  cols: ["Feature","Dilated (DCM)","Hypertrophic (HCM)","Restrictive (RCM)"],
  rows: [
    ["EF", {blank:"LOW (≤40%) — systolic failure",w:200}, {blank:"Normal or HIGH — diastolic dysfunction",w:200}, {blank:"Normal (≥50%) — compliance failure",w:200}],
    ["Main problem", {blank:"Contractility failure (systolic)",w:200}, {blank:"Dynamic LVOTO + diastolic dysfunction",w:200}, {blank:"Impaired ventricular filling (stiff wall)",w:200}],
    ["Gross finding", {blank:"4-chamber dilation; 'flabby heart' >500g",w:200}, {blank:"Asymmetric septal hypertrophy; 'banana LV'",w:200}, {blank:"Normal wall thickness; biatrial dilation",w:200}],
    ["Classic gene", {blank:"TTN (titin) — 'ninja star' nuclei",w:200}, {blank:"β-myosin heavy chain (MYH7 / MYBPC3)",w:200}, {blank:"TTR (amyloid) or sarcomere proteins",w:200}],
    ["Classic cause", {blank:"Alcohol / Coxsackie B / doxorubicin / peripartum",w:200}, {blank:"Autosomal dominant sarcomere mutation",w:200}, {blank:"Amyloid / sarcoid / hemochromatosis",w:200}],
    ["Valsalva effect on murmur", {blank:"Softer (less flow into dilated LV)",w:200}, {blank:"LOUDER (↓ LV volume → ↑ LVOTO)",w:200}, {blank:"No murmur (filling problem, not obstruction)",w:200}],
    ["Histology clue", {blank:"Ninja star-like nuclei (TTN mutation)",w:200}, {blank:"Myofiber disarray + interstitial fibrosis",w:200}, {blank:"Amyloid: Congo red → apple-green birefringence",w:200}],
  ],
  extras: {
    title: "Heart Failure — Key Associations",
    ecols: ["Finding / Test","Diagnosis / Significance"],
    erows: [
      [{blank:"S3 gallop",w:200}, {blank:"HFrEF / volume overload — rapid flow into dilated ventricle",w:380}],
      [{blank:"S4 gallop",w:200}, {blank:"HFpEF / hypertrophy — blood hitting stiff, non-compliant ventricle",w:380}],
      [{blank:"Elevated BNP",w:200}, {blank:"Ventricular stretch → HF diagnosis + monitoring severity",w:380}],
      [{blank:"EF ≤40%",w:200}, {blank:"HFrEF — systolic dysfunction → GDMT: Beta-blocker + ARNI + MRA + SGLT2i",w:380}],
      [{blank:"EF ≥50%",w:200}, {blank:"HFpEF — diastolic dysfunction (stiff ventricle)",w:380}],
    ]
  }
},

chd: {
  title: "Congenital Heart Disease — Presentation & Key Features",
  instructions: "Fill in the defect name, cyanosis timing, hallmark finding, and key associations.",
  cols: ["Defect","Cyanosis?","Hallmark Finding / Murmur","Key Associations / Trap"],
  rows: [
    [{blank:"VSD (ventricular septal defect)",w:240}, {blank:"Late (Eisenmenger only)",w:180}, {blank:"Holosystolic at LLSB; thrill; small defects louder",w:260}, {blank:"Most common CHD; muscular type closes spontaneously",w:240}],
    [{blank:"ASD (atrial septal defect)",w:240}, {blank:"Late or never",w:180}, {blank:"Wide, FIXED split S2 + SEM at LUSB",w:260}, {blank:"Murmur from pulmonary valve flow (NOT the defect); ostium secundum most common",w:240}],
    [{blank:"PDA (patent ductus arteriosus)",w:240}, {blank:"Late or never",w:180}, {blank:"Continuous 'machine-like' murmur; bounding pulses",w:260}, {blank:"Close with indomethacin; keep open with PGE1",w:240}],
    [{blank:"TOF (Tetralogy of Fallot)",w:240}, {blank:"YES — early; 'tet spells'",w:180}, {blank:"Systolic murmur; squatting relieves cyanosis",w:260}, {blank:"PROVe: PS + RVH + Overriding aorta + VSD; severity = degree of PS; DiGeorge assoc.",w:240}],
    [{blank:"TGA (Transposition of Great Arteries)",w:240}, {blank:"YES — IMMEDIATE at birth",w:180}, {blank:"Often no major murmur; O2 doesn't improve sat",w:260}, {blank:"Parallel circuits; PGE1 to maintain PDA mixing; maternal DM assoc.",w:240}],
    [{blank:"Coarctation of aorta",w:240}, {blank:"NO — pressure problem",w:180}, {blank:"Upper extremity HTN + weak femoral pulses; rib notching",w:260}, {blank:"Turner syndrome + bicuspid AV + Berry aneurysms; LVH → LHF untreated",w:240}],
    [{blank:"Eisenmenger syndrome",w:240}, {blank:"YES — late-onset",w:180}, {blank:"Reversal of L→R shunt to R→L; cyanosis + clubbing",w:260}, {blank:"Surgical closure CONTRAINDICATED once established",w:240}],
  ],
  extras:{
    title:"Genetic Syndrome → Cardiac Defect",
    ecols:["Syndrome","Cardiac Lesion","Unique Clue"],
    erows:[
      [{blank:"Down syndrome (Trisomy 21)",w:220},{blank:"Endocardial cushion defect (AV canal)",w:220},{blank:"Brachycephaly, simian crease, hypotonia",w:200}],
      [{blank:"Turner syndrome (45,XO)",w:220},{blank:"Coarctation + bicuspid aortic valve",w:220},{blank:"Short female, webbed neck",w:200}],
      [{blank:"DiGeorge (22q11 deletion)",w:220},{blank:"Conotruncal defects (ToF, truncus arteriosus)",w:220},{blank:"CATCH-22: Thymic aplasia + Hypocalcemia",w:200}],
      [{blank:"Williams-Beuren (7q11)",w:220},{blank:"Supravalvular aortic + pulmonary stenosis",w:220},{blank:"Elastin gene; 'elfin facies'; hypercalcemia",w:200}],
    ]
  }
},

valves: {
  title: "Valvular Disease — Murmur, Hemodynamics & LV Response",
  instructions: "Complete the table for each valve lesion. Pay special attention to LV response type and dynamic maneuver effects.",
  cols: ["Lesion","Murmur Timing","Murmur Location","Radiation","LV Response","Valsalva Effect"],
  rows: [
    [{blank:"Aortic Stenosis (AS)",w:180},{blank:"Systolic (crescendo-decrescendo)",w:220},{blank:"RUSB (right 2nd ICS)",w:160},{blank:"Carotids",w:120},{blank:"Concentric LVH (pressure overload)",w:200},{blank:"SOFTER (less stroke volume)",w:180}],
    [{blank:"Aortic Regurgitation (AR)",w:180},{blank:"Diastolic (decrescendo)",w:220},{blank:"LSB (lean forward)",w:160},{blank:"None",w:120},{blank:"Eccentric LVH / dilation (volume overload)",w:200},{blank:"Softer",w:180}],
    [{blank:"Mitral Regurgitation (MR)",w:180},{blank:"Holosystolic",w:220},{blank:"Apex",w:160},{blank:"Axilla (pathognomonic)",w:120},{blank:"Eccentric LVH / dilation (volume overload)",w:200},{blank:"Softer",w:180}],
    [{blank:"Mitral Stenosis (MS)",w:180},{blank:"Diastolic rumble + opening snap",w:220},{blank:"Apex (bell of stethoscope)",w:160},{blank:"None",w:120},{blank:"NO LVH — LA enlarges instead",w:200},{blank:"No change",w:180}],
    [{blank:"MVP (Mitral Valve Prolapse)",w:180},{blank:"Mid-systolic click + late systolic",w:220},{blank:"Apex",w:160},{blank:"None",w:120},{blank:"Normal (no volume/pressure overload)",w:200},{blank:"Click moves EARLIER (not louder)",w:180}],
    [{blank:"HCM",w:180},{blank:"Systolic (ejection)",w:220},{blank:"LUSB / LLSB",w:160},{blank:"None",w:120},{blank:"Asymmetric septal hypertrophy (normal EF)",w:200},{blank:"LOUDER (only murmur that does this)",w:180}],
  ],
  extras:{
    title:"Dynamic Maneuver Rules",
    ecols:["Maneuver","Preload Effect","HCM","MVP Click","All Other Murmurs"],
    erows:[
      [{blank:"Valsalva / Standing",w:200},{blank:"↓ Decreases preload",w:180},{blank:"LOUDER",w:100},{blank:"EARLIER",w:100},{blank:"Softer",w:100}],
      [{blank:"Squatting / Handgrip",w:200},{blank:"↑ Increases preload (+ afterload)",w:180},{blank:"Softer",w:100},{blank:"LATER",w:100},{blank:"Louder",w:100}],
      [{blank:"Inspiration",w:200},{blank:"↑ Right heart return",w:180},{blank:"No change",w:100},{blank:"No change",w:100},{blank:"Right-sided murmurs louder",w:100}],
    ]
  }
}
};

let currentTab='mi', checked=false;
const inputs=()=>document.querySelectorAll('.blank input');
const scoreEl=()=>document.getElementById('sc');
const totalEl=()=>document.getElementById('tot');

function setTab(name,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  currentTab=name; checked=false;
  render();
}

function render(){
  const t=TABLES[currentTab];
  let h=`<div class="section-title">${t.title}</div>
  <div class="instruction"><strong>Instructions:</strong> ${t.instructions} Press <kbd style="background:var(--border);padding:1px 6px;border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:11px">Check Answers</kbd> when ready.</div>
  <div class="score-bar">
    <span class="lbl">Score:</span><span class="num" id="sc">—</span><span class="lbl">/ <span id="tot">—</span></span>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button class="btn-reset" onclick="resetAll()">Reset</button>
      <button class="btn-check" onclick="checkAll()">Check Answers</button>
    </div>
  </div>`;

  // MAIN TABLE
  h+=`<table class="fill-table"><thead><tr>${t.cols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
  t.rows.forEach((row,ri)=>{
    const isHL=t.highlight&&t.highlight.includes(ri);
    h+=`<tr class="${isHL?'highlight-row':''}">`;
    row.forEach((cell,ci)=>{
      if(typeof cell==='string') h+=`<td class="cell-fixed">${cell}</td>`;
      else h+=`<td><div class="blank"><input type="text" style="width:${cell.w||180}px" data-ans="${escA(cell.blank)}" placeholder="________"></div></td>`;
    });
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;

  // EXTRAS TABLE
  if(t.extras){
    h+=`<div class="section-title" style="margin-top:8px">${t.extras.title}</div>
    <table class="fill-table"><thead><tr>${t.extras.ecols.map(c=>`<th>${c}</th>`).join('')}</tr></thead><tbody>`;
    t.extras.erows.forEach(row=>{
      h+=`<tr>`;
      row.forEach(cell=>{
        if(typeof cell==='string') h+=`<td class="cell-fixed">${cell}</td>`;
        else h+=`<td><div class="blank"><input type="text" style="width:${cell.w||180}px" data-ans="${escA(cell.blank)}" placeholder="________"></div></td>`;
      });
      h+=`</tr>`;
    });
    h+=`</tbody></table>`;
  }

  document.getElementById('content').innerHTML=h;
}

function escA(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

function normalize(s){
  return s.toLowerCase()
    .replace(/[^a-z0-9\s]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

function isCorrect(userVal, answer){
  const u=normalize(userVal), a=normalize(answer);
  if(u===a) return true;
  // allow partial match for long answers (at least 50% of key words)
  const aWords=a.split(' ').filter(w=>w.length>3);
  if(!aWords.length) return u.includes(a.slice(0,6).trim());
  const hits=aWords.filter(w=>u.includes(w));
  return hits.length>=Math.ceil(aWords.length*0.55);
}

function checkAll(){
  checked=true;
  let total=0, correct=0;
  inputs().forEach(inp=>{
    const ans=inp.getAttribute('data-ans');
    inp.classList.remove('correct','wrong','revealed');
    if(!inp.value.trim()){
      inp.value=ans;
      inp.classList.add('revealed');
    } else if(isCorrect(inp.value, ans)){
      inp.classList.add('correct'); correct++;
    } else {
      inp.classList.add('wrong');
      inp.title=`✓ Expected: ${ans}`;
    }
    total++;
  });
  const pct=Math.round(correct/total*100);
  document.getElementById('sc').textContent=correct;
  document.getElementById('tot').textContent=total;
  document.getElementById('sc').style.color=pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
}

function resetAll(){
  checked=false;
  inputs().forEach(inp=>{inp.value='';inp.classList.remove('correct','wrong','revealed');inp.title='';inp.style.color=''});
  document.getElementById('sc').textContent='—';
  document.getElementById('sc').style.color='';
  document.getElementById('tot').textContent='—';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && e.ctrlKey){checkAll();}
});

render();
</script>
</body>
</html>
